<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2d3148;
  --accent: #4f46e5;
  --accent-dim: #3730a3;
  --text: #e2e8f0;
  --text-sec: #94a3b8;
  --text-muted: #64748b;
  --green: #22c55e;
  --green-dim: #34d399;
  --orange: #fb923c;
  --red: #ef4444;
  --purple: #a855f7;
  --yellow: #facc15;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 52px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-right: 8px;
}
.tab-btn {
  background: none;
  border: none;
  color: var(--text-sec);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.tab-btn.active { background: var(--accent); color: #fff; }
.topbar-spacer { flex: 1; }
.refresh-btn {
  background: rgba(79,70,229,0.15);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.refresh-btn:hover { background: var(--accent); color: #fff; }
.refresh-btn.loading { opacity: 0.6; cursor: default; }

/* MAIN TABS */
.tab-panel { display: none; padding: 24px; }
.tab-panel.active { display: block; }

/* FILTER BAR */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-sec);
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-count {
  margin-left: 4px;
  font-size: 11px;
  opacity: 0.7;
}

/* PROJECT GRID */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* PROJECT CARD */
.project-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.project-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(79,70,229,0.15);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.status-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-active { background: rgba(34,197,94,0.15); color: var(--green); }
.status-paused { background: rgba(251,146,60,0.15); color: var(--orange); }
.status-done { background: rgba(168,85,247,0.15); color: var(--purple); }
.status-unknown { background: rgba(100,116,139,0.15); color: var(--text-muted); }

.card-meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-sec);
}
.card-row .label { color: var(--text-muted); min-width: 56px; }
.card-row code {
  background: rgba(255,255,255,0.05);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
}

/* Progress bar */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}
.progress-bar {
  flex: 1;
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), #818cf8);
  transition: width 0.3s;
}
.progress-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* Service dot */
.svc-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.svc-running { background: var(--green); box-shadow: 0 0 6px var(--green); }
.svc-stopped { background: var(--red); }
.svc-unknown { background: var(--text-muted); }

/* Tech stack tags */
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.tag {
  background: rgba(79,70,229,0.1);
  border: 1px solid rgba(79,70,229,0.3);
  color: #a5b4fc;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
}
.tag-more { color: var(--text-muted); font-size: 10px; align-self: center; }

/* GLOBAL TAB */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.kpi-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 700; }
.kpi-green { color: var(--green); }
.kpi-orange { color: var(--orange); }
.kpi-accent { color: var(--accent); }
.kpi-yellow { color: var(--yellow); }

.summary-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
}
.summary-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  padding: 10px 14px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--border);
}
.summary-table td {
  padding: 10px 14px;
  font-size: 13px;
  border-bottom: 1px solid rgba(45,49,72,0.5);
  vertical-align: middle;
}
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tr:hover td { background: rgba(255,255,255,0.02); }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 900px;
  min-height: 600px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.modal-path {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'SF Mono', Consolas, monospace;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

.modal-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 24px 0;
  border-bottom: 1px solid var(--border);
}
.modal-tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: var(--text-sec);
  font-size: 13px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.modal-tab-btn:hover { color: var(--text); }
.modal-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.modal-body {
  padding: 20px 24px;
  flex: 1;
  overflow-y: auto;
}
.modal-tab-content { display: none; }
.modal-tab-content.active { display: block; }

/* SECTIONS */
.section {
  margin-bottom: 24px;
}
.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ARCH SUMMARY */
.arch-text {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.7;
}

/* GIT STATUS */
.git-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.git-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.git-item .key { color: var(--text-muted); }
.git-item .val { color: var(--text); font-family: 'SF Mono', Consolas, monospace; }
.dirty-files { margin-top: 8px; }
.dirty-file {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
  padding: 2px 0;
}
.dirty-M { color: var(--orange); }
.dirty-A { color: var(--green); }
.dirty-D { color: var(--red); }
.dirty-QQ { color: var(--text-muted); }
.recent-commits {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.commit-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: var(--text-sec);
}
.commit-hash {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 10px;
  color: var(--accent);
  flex-shrink: 0;
  padding-top: 1px;
}
.commit-msg { color: var(--text-sec); }

/* DEPLOY */
.deploy-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(79,70,229,0.15);
  color: #a5b4fc;
  margin-bottom: 8px;
}
.deploy-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; font-size: 12px; }
.deploy-key { color: var(--text-muted); }
.deploy-val { color: var(--text); }
.deploy-val a { color: var(--accent); text-decoration: none; }
.deploy-val a:hover { text-decoration: underline; }
.deploy-cmd {
  margin-top: 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
  color: var(--green-dim);
  white-space: pre-wrap;
  word-break: break-all;
}

/* LOC */
.mini-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.mini-stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  flex: 1;
  min-width: 100px;
}
.mini-stat-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.mini-stat-value { font-size: 18px; font-weight: 600; color: var(--text); }

.lang-bar { display: flex; flex-direction: column; gap: 6px; }
.lang-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.lang-name { width: 100px; color: var(--text-sec); flex-shrink: 0; }
.lang-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.lang-fill { height: 100%; border-radius: 3px; }
.lang-count { width: 60px; text-align: right; color: var(--text-muted); flex-shrink: 0; }

/* FEATURES */
.feature-list { display: flex; flex-direction: column; gap: 6px; }
.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
}
.feature-check { flex-shrink: 0; width: 16px; text-align: center; }
.feature-check.done { color: var(--green); }
.feature-check.planned { color: var(--text-muted); }
.feature-text { color: var(--text-sec); flex: 1; }
.feature-source {
  font-size: 10px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* DESIGN DOCS */
.docs-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
  min-height: 400px;
}
.docs-sidebar {
  border-right: 1px solid var(--border);
  padding-right: 16px;
}
.docs-sidebar-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.doc-file-item {
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-sec);
  margin-bottom: 2px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.doc-file-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.doc-file-item.active { background: rgba(79,70,229,0.15); color: var(--accent); }
.stale-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--orange);
  flex-shrink: 0;
  margin-left: auto;
}

.docs-content { overflow: hidden; }
.docs-content-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}
.markdown-body {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.7;
}
.markdown-body h1, .markdown-body h2, .markdown-body h3 {
  color: var(--text);
  margin: 16px 0 8px;
  font-weight: 600;
}
.markdown-body h1 { font-size: 18px; }
.markdown-body h2 { font-size: 15px; }
.markdown-body h3 { font-size: 13px; }
.markdown-body p { margin-bottom: 8px; }
.markdown-body ul, .markdown-body ol { margin: 6px 0 6px 20px; }
.markdown-body li { margin-bottom: 2px; }
.markdown-body code {
  background: rgba(255,255,255,0.07);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
  color: #c4b5fd;
}
.markdown-body pre {
  background: rgba(0,0,0,0.35);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
}
.markdown-body pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  color: var(--green-dim);
}
.markdown-body strong { color: var(--text); font-weight: 600; }
.markdown-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}
.markdown-body blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-muted);
  margin: 8px 0;
}

.ai-cmd-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.ai-cmd-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.ai-cmd-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
  color: var(--green-dim);
}
.ai-cmd-text { flex: 1; word-break: break-all; }
.copy-btn {
  background: rgba(79,70,229,0.15);
  border: 1px solid rgba(79,70,229,0.4);
  color: var(--accent);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.copy-btn:hover { background: var(--accent); color: #fff; }

/* PLANS */
.plan-file {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 14px;
}
.plan-file-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  font-family: 'SF Mono', Consolas, monospace;
}
.plan-progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.task-list { display: flex; flex-direction: column; gap: 4px; }
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  padding: 2px 0;
}
.task-check { flex-shrink: 0; }
.task-check.done { color: var(--green); }
.task-check.todo { color: var(--text-muted); }
.task-text.done { color: var(--text-muted); text-decoration: line-through; }
.task-text.todo { color: var(--text-sec); }

/* PLACEHOLDER */
.placeholder {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.placeholder-icon { font-size: 36px; margin-bottom: 12px; }
.placeholder-title { font-size: 15px; color: var(--text-sec); margin-bottom: 6px; }

/* ERROR STATE */
.error-state {
  text-align: center;
  padding: 40px;
  color: var(--red);
  font-size: 13px;
}

/* LOADING */
.loading-state {
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
  font-size: 13px;
}

/* EMPTY */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-title">⚡ Vibe Manager</span>
  <button class="tab-btn active" id="tab-overview-btn" onclick="showTab('overview')">📊 项目概览</button>
  <button class="tab-btn" id="tab-global-btn" onclick="showTab('global')">🌐 全局面貌</button>
  <div class="topbar-spacer"></div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadProjects()">↻ 刷新</button>
</div>

<!-- TAB 1: 项目概览 -->
<div class="tab-panel active" id="panel-overview">
  <div class="filter-bar">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all', this)">全部 <span class="filter-count" id="count-all">0</span></button>
    <button class="filter-btn" id="filter-active" onclick="setFilter('active', this)">Active <span class="filter-count" id="count-active">0</span></button>
    <button class="filter-btn" id="filter-paused" onclick="setFilter('paused', this)">Paused <span class="filter-count" id="count-paused">0</span></button>
    <button class="filter-btn" id="filter-done" onclick="setFilter('done', this)">Done <span class="filter-count" id="count-done">0</span></button>
  </div>
  <div class="project-grid" id="project-grid">
    <div class="loading-state">加载中...</div>
  </div>
</div>

<!-- TAB 2: 全局面貌 -->
<div class="tab-panel" id="panel-global">
  <div class="kpi-row" id="kpi-row">
    <!-- KPI cards rendered here -->
  </div>
  <table class="summary-table" id="summary-table">
    <thead>
      <tr>
        <th>项目名称</th>
        <th>状态</th>
        <th>服务</th>
        <th>部署</th>
        <th>计划完成</th>
        <th>本月 Commits</th>
      </tr>
    </thead>
    <tbody id="summary-tbody"></tbody>
  </table>
</div>

<!-- PROJECT DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Project Name</div>
      <div class="modal-path" id="modal-path">/path/to/project</div>
    </div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-tabs">
      <button class="modal-tab-btn active" id="mtab-overview" onclick="showModalTab('overview')">🌐 全局面貌</button>
      <button class="modal-tab-btn" id="mtab-design" onclick="showModalTab('design')">📐 设计文档</button>
      <button class="modal-tab-btn" id="mtab-plans" onclick="showModalTab('plans')">✅ 计划</button>
      <button class="modal-tab-btn" id="mtab-docs" onclick="showModalTab('docs')">📄 文档</button>
    </div>
    <div class="modal-body">
      <div class="modal-tab-content active" id="mcontent-overview"></div>
      <div class="modal-tab-content" id="mcontent-design"></div>
      <div class="modal-tab-content" id="mcontent-plans"></div>
      <div class="modal-tab-content" id="mcontent-docs">
        <div class="placeholder">
          <div class="placeholder-icon">📄</div>
          <div class="placeholder-title">文档查看器 — 即将推出</div>
          <div>即将支持项目文档浏览</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allProjects = [];
let currentFilter = 'all';
let currentProject = null;
let currentDocIdx = 0;
let currentModalTab = 'overview';

// ─── Utility ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function simpleMarkdown(md) {
  if (!md) return '';
  let html = escHtml(md);
  // Code blocks (must come before inline code)
  html = html.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // H1-H3
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // HR
  html = html.replace(/^---+$/gm, '<hr>');
  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list items
  html = html.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
  // Ordered list items
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Paragraphs (lines not starting with html tags)
  html = html.replace(/^(?!<[a-z]|$)(.+)$/gm, '<p>$1</p>');
  return html;
}

function kpiCard(label, value, colorClass) {
  return `<div class="kpi-card">
    <div class="kpi-label">${escHtml(label)}</div>
    <div class="kpi-value ${colorClass || ''}">${escHtml(String(value))}</div>
  </div>`;
}

function miniStat(label, value) {
  return `<div class="mini-stat">
    <div class="mini-stat-label">${escHtml(label)}</div>
    <div class="mini-stat-value">${escHtml(String(value))}</div>
  </div>`;
}

function statusBadge(status) {
  const map = {
    active: ['Active', 'status-active'],
    paused: ['Paused', 'status-paused'],
    done: ['Done', 'status-done'],
  };
  const [label, cls] = map[status] || [status || 'Unknown', 'status-unknown'];
  return `<span class="status-badge ${cls}">${escHtml(label)}</span>`;
}

function svcDot(svc) {
  if (!svc) return '<span class="svc-dot svc-unknown"></span>';
  if (svc.is_running) return '<span class="svc-dot svc-running"></span>';
  return '<span class="svc-dot svc-stopped"></span>';
}

function planPct(plans) {
  if (!plans || plans.total === 0) return 0;
  return Math.round((plans.done / plans.total) * 100);
}

function progressBar(done, total, width) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  const wStyle = width ? `width:${width};` : '';
  return `<div class="progress-wrap" style="${wStyle}">
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <span class="progress-label">${done}/${total} (${pct}%)</span>
  </div>`;
}

const LANG_COLORS = [
  '#818cf8','#34d399','#fb923c','#f472b6','#facc15',
  '#60a5fa','#a78bfa','#4ade80','#f87171','#38bdf8',
];

// ─── Load Projects ────────────────────────────────────────────────────────────
async function loadProjects() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ 加载中…';
  try {
    const res = await fetch('/api/projects');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allProjects = await res.json();
    renderCards();
    renderGlobal();
    updateFilterCounts();
  } catch (e) {
    document.getElementById('project-grid').innerHTML =
      `<div class="error-state">⚠ 加载失败: ${escHtml(e.message)}</div>`;
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '↻ 刷新';
  }
}

function updateFilterCounts() {
  const counts = { all: allProjects.length, active: 0, paused: 0, done: 0 };
  for (const p of allProjects) {
    if (p.status in counts) counts[p.status]++;
  }
  document.getElementById('count-all').textContent = counts.all;
  document.getElementById('count-active').textContent = counts.active;
  document.getElementById('count-paused').textContent = counts.paused;
  document.getElementById('count-done').textContent = counts.done;
}

// ─── Tab Switching ────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-' + name + '-btn').classList.add('active');
}

function setFilter(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ─── Card Rendering ───────────────────────────────────────────────────────────
function renderCards() {
  const filtered = currentFilter === 'all'
    ? allProjects
    : allProjects.filter(p => p.status === currentFilter);

  const grid = document.getElementById('project-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">暂无项目</div>';
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

const DEPLOY_ICONS = {
  ec2: '☁️', gcp: '☁️', azure: '☁️', lightsail: '☁️',
  netlify: '🌐', vercel: '▲', heroku: '🟣', railway: '🚄',
  render: '🎨', docker: '🐳', vps: '🖥️', codedeploy: '☁️', gae: '☁️',
};
function deployLabel(deploy) {
  if (!deploy || deploy.type === 'none' || !deploy.type) return null;
  const icon = DEPLOY_ICONS[deploy.type] || '☁️';
  const label = deploy.type.toUpperCase();
  const host = deploy.host ? `<code style="font-size:11px;opacity:.75">${escHtml(deploy.host)}</code>` : '';
  return `${icon} <span style="color:var(--accent)">${label}</span> ${host}`;
}

function renderCard(p) {
  const git = p.git || {};
  const plans = p.plans || {};
  const svc = p.service || {};
  const deploy = p.deploy || {};
  const tags = (p.tech_stack || []).slice(0, 4);
  const moreCount = (p.tech_stack || []).length - 4;

  const svcStatus = svc.port
    ? `${svcDot(svc)} <span>:${svc.port}</span>`
    : `${svcDot(null)} <span>无服务</span>`;

  const dLabel = deployLabel(deploy);

  return `<div class="project-card" onclick="openProject('${escHtml(p.id)}')">
    <div class="card-header">
      <span class="card-name">${escHtml(p.name)}</span>
      ${statusBadge(p.status)}
    </div>
    <div class="card-meta">
      <div class="card-row">
        <span class="label">分支</span>
        <code>${escHtml(git.branch || '—')}</code>
        <code>${escHtml((git.commit_hash || '').slice(0, 7) || '—')}</code>
        <span style="margin-left:auto;color:var(--text-muted)">↑${git.monthly_commits || 0} commits/月</span>
      </div>
      <div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">计划进度</div>
        ${progressBar(plans.done || 0, plans.total || 0)}
      </div>
      <div class="card-row">
        <span class="label">服务</span>
        ${svcStatus}
        ${dLabel ? `<span style="margin-left:8px;font-size:12px">${dLabel}</span>` : ''}
      </div>
      ${tags.length ? `<div class="tag-row">
        ${tags.map(t => `<span class="tag">${escHtml(t.name || t)}</span>`).join('')}
        ${moreCount > 0 ? `<span class="tag-more">+${moreCount}</span>` : ''}
      </div>` : ''}
    </div>
  </div>`;
}

// ─── Global Tab ───────────────────────────────────────────────────────────────
function renderGlobal() {
  const active = allProjects.filter(p => p.status === 'active').length;
  const running = allProjects.filter(p => p.service && p.service.is_running).length;
  const commits = allProjects.reduce((s, p) => s + ((p.git && p.git.monthly_commits) || 0), 0);

  document.getElementById('kpi-row').innerHTML =
    kpiCard('总项目', allProjects.length, 'kpi-accent') +
    kpiCard('Active', active, 'kpi-green') +
    kpiCard('服务运行中', running, 'kpi-orange') +
    kpiCard('本月 Commits', commits, 'kpi-yellow');

  const tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = allProjects.map(p => {
    const svc = p.service || {};
    const plans = p.plans || {};
    const pct = planPct(plans);
    const svcCell = svc.port
      ? `${svcDot(svc)} :${escHtml(String(svc.port))}`
      : `${svcDot(null)} —`;

    const dLabel = deployLabel(p.deploy);
    return `<tr onclick="openProject('${escHtml(p.id)}')" style="cursor:pointer">
      <td>${escHtml(p.name)}</td>
      <td>${statusBadge(p.status)}</td>
      <td style="display:flex;align-items:center;gap:6px">${svcCell}</td>
      <td style="font-size:12px">${dLabel || '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:80px">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <span class="progress-label">${pct}%</span>
        </div>
      </td>
      <td style="color:var(--text-sec)">${(p.git && p.git.monthly_commits) || 0}</td>
    </tr>`;
  }).join('');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openProject(id) {
  currentProject = allProjects.find(p => p.id === id || String(p.id) === String(id));
  if (!currentProject) return;

  document.getElementById('modal-title').textContent = currentProject.name;
  document.getElementById('modal-path').textContent = currentProject.path || '';
  document.getElementById('modal-overlay').classList.add('open');

  // Reset to first tab
  showModalTab('overview');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentProject = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function showModalTab(tab) {
  currentModalTab = tab;
  document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('mtab-' + tab).classList.add('active');
  document.getElementById('mcontent-' + tab).classList.add('active');

  if (!currentProject) return;
  if (tab === 'overview') renderProjectOverview(currentProject);
  if (tab === 'design') renderDesignDocs(currentProject);
  if (tab === 'plans') renderPlans(currentProject);
}

// ─── Modal: 全局面貌 ──────────────────────────────────────────────────────────
function renderProjectOverview(p) {
  const el = document.getElementById('mcontent-overview');
  const git = p.git || {};
  const deploy = p.deploy || {};
  const loc = p.loc || {};
  const features = p.features || [];

  let html = '';

  // Arch summary
  const summaryBtnId = `btn-summarize-${p.id}`;
  if (p.arch_summary) {
    html += `<div class="section">
      <div class="section-title" style="display:flex;align-items:center;gap:8px;">
        架构概述
        <button id="${summaryBtnId}" onclick="generateSummary('${p.id}')" style="font-size:11px;padding:2px 8px;cursor:pointer;border:1px solid #555;border-radius:4px;background:#2a2a2a;color:#aaa;">↻ 重新生成</button>
      </div>
      <div class="arch-text" id="arch-text-${p.id}">${simpleMarkdown(p.arch_summary)}</div>
    </div>`;
  } else {
    html += `<div class="section">
      <div class="section-title">架构概述</div>
      <div style="color:#666;font-size:13px;margin-bottom:8px;">暂无总结</div>
      <button id="${summaryBtnId}" onclick="generateSummary('${p.id}')" style="font-size:12px;padding:4px 12px;cursor:pointer;border:1px solid #4a7c59;border-radius:4px;background:#1e3a28;color:#7fc794;">✨ AI 生成总结</button>
    </div>`;
  }

  // Tech stack
  if ((p.tech_stack || []).length) {
    html += `<div class="section">
      <div class="section-title">技术栈</div>
      <div class="tag-row">
        ${(p.tech_stack || []).map(t => `<span class="tag">${escHtml(t.name || t)}</span>`).join('')}
      </div>
    </div>`;
  }

  // Git
  html += `<div class="section">
    <div class="section-title">Git 状态</div>
    <div class="git-row">
      <div class="git-item"><span class="key">分支</span><span class="val">${escHtml(git.branch || '—')}</span></div>
      <div class="git-item"><span class="key">Commit</span><span class="val">${escHtml((git.commit_hash || '').slice(0, 8) || '—')}</span></div>
      <div class="git-item"><span class="key">本月</span><span class="val">${git.monthly_commits || 0} commits</span></div>
    </div>`;

  if ((git.dirty_files || []).length) {
    html += `<div class="dirty-files">
      ${(git.dirty_files || []).map(f => {
        const parts = f.trim().split(/\s+/);
        const flag = parts[0] || '??';
        const name = parts.slice(1).join(' ');
        const cls = flag.includes('M') ? 'dirty-M'
          : flag.includes('A') ? 'dirty-A'
          : flag.includes('D') ? 'dirty-D'
          : 'dirty-QQ';
        return `<div class="dirty-file ${cls}">${escHtml(flag)} ${escHtml(name)}</div>`;
      }).join('')}
    </div>`;
  }

  if ((git.recent_commits || []).length) {
    html += `<div class="recent-commits">
      ${(git.recent_commits || []).slice(0, 8).map(c => {
        const hash = typeof c === 'object' ? (c.hash || '') : '';
        const msg = typeof c === 'object' ? (c.message || c.msg || String(c)) : String(c);
        return `<div class="commit-item">
          ${hash ? `<span class="commit-hash">${escHtml(hash.slice(0, 7))}</span>` : ''}
          <span class="commit-msg">${escHtml(msg)}</span>
        </div>`;
      }).join('')}
    </div>`;
  }
  html += `</div>`;

  // Deploy
  if (deploy && (deploy.type || deploy.host || deploy.url)) {
    html += `<div class="section">
      <div class="section-title">部署信息</div>
      ${deploy.type ? `<span class="deploy-badge">${escHtml(deploy.type)}</span>` : ''}
      <div class="deploy-grid">
        ${deploy.host ? `<span class="deploy-key">Host</span><span class="deploy-val">${escHtml(deploy.host)}</span>` : ''}
        ${deploy.url ? `<span class="deploy-key">URL</span><span class="deploy-val"><a href="${escHtml(deploy.url)}" target="_blank">${escHtml(deploy.url)}</a></span>` : ''}
        ${deploy.remote_dir ? `<span class="deploy-key">目录</span><span class="deploy-val">${escHtml(deploy.remote_dir)}</span>` : ''}
      </div>
      ${deploy.cmd ? `<div class="deploy-cmd">${escHtml(deploy.cmd)}</div>` : ''}
    </div>`;
  }

  // LOC
  if (loc.total_lines || loc.code_lines) {
    const commentPct = loc.total_lines
      ? Math.round(((loc.comment_lines || 0) / loc.total_lines) * 100)
      : 0;
    html += `<div class="section">
      <div class="section-title">代码规模</div>
      <div class="mini-stats">
        ${miniStat('总行数', (loc.total_lines || 0).toLocaleString())}
        ${miniStat('代码行', (loc.code_lines || 0).toLocaleString())}
        ${miniStat('文件数', (loc.file_count || 0).toLocaleString())}
        ${miniStat('注释率', commentPct + '%')}
      </div>`;

    const langs = loc.languages || [];
    if (langs.length) {
      const maxLines = Math.max(...langs.map(l => l.code || l.lines || 0), 1);
      html += `<div class="lang-bar">
        ${langs.slice(0, 8).map((l, i) => {
          const lines = l.code || l.lines || 0;
          const pct = Math.round((lines / maxLines) * 100);
          const color = LANG_COLORS[i % LANG_COLORS.length];
          return `<div class="lang-row">
            <span class="lang-name">${escHtml(l.name || l.language || '')}</span>
            <div class="lang-track"><div class="lang-fill" style="width:${pct}%;background:${color}"></div></div>
            <span class="lang-count">${lines.toLocaleString()}</span>
          </div>`;
        }).join('')}
      </div>`;
    }
    html += `</div>`;
  }

  // Features
  if (features.length) {
    html += `<div class="section">
      <div class="section-title">功能列表</div>
      <div class="feature-list">
        ${features.map(f => {
          const impl = f.implemented !== false;
          return `<div class="feature-item">
            <span class="feature-check ${impl ? 'done' : 'planned'}">${impl ? '✓' : '○'}</span>
            <span class="feature-text">${escHtml(f.text || '')}</span>
            ${f.source ? `<span class="feature-source">${escHtml(f.source)}</span>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (!html) html = '<div class="placeholder"><div class="placeholder-icon">🌐</div><div class="placeholder-title">暂无概览信息</div></div>';
  el.innerHTML = html;
}

// ─── Modal: 设计文档 ──────────────────────────────────────────────────────────
function renderDesignDocs(p) {
  const el = document.getElementById('mcontent-design');
  const docs = p.design_docs || [];

  if (!docs.length) {
    el.innerHTML = `<div class="placeholder">
      <div class="placeholder-icon">📐</div>
      <div class="placeholder-title">暂无设计文档</div>
    </div>`;
    return;
  }

  currentDocIdx = 0;

  const sidebarItems = docs.map((d, i) => `
    <div class="doc-file-item ${i === 0 ? 'active' : ''}" id="doc-item-${i}" onclick="showDoc(${i})">
      <span>${escHtml(d.filename || d.title || `文档 ${i+1}`)}</span>
      ${d.possibly_stale ? '<span class="stale-dot" title="可能已过期"></span>' : ''}
    </div>`).join('');

  const aiCmd = p.path
    ? `claude "请根据最新代码更新设计文档" --project "${escHtml(p.path)}"`
    : '';

  el.innerHTML = `<div class="docs-layout">
    <div class="docs-sidebar">
      <div class="docs-sidebar-title">文档列表</div>
      ${sidebarItems}
      ${aiCmd ? `<div class="ai-cmd-section">
        <div class="ai-cmd-label">✦ AI 更新文档</div>
        <div class="ai-cmd-box">
          <span class="ai-cmd-text" id="ai-cmd-text">${escHtml(aiCmd)}</span>
          <button class="copy-btn" onclick="copyAiCmd()">复制</button>
        </div>
      </div>` : ''}
    </div>
    <div class="docs-content" id="docs-content">
      <!-- doc content injected here -->
    </div>
  </div>`;

  showDoc(0);
}

function showDoc(idx) {
  const p = currentProject;
  if (!p) return;
  const docs = p.design_docs || [];
  if (idx < 0 || idx >= docs.length) return;

  currentDocIdx = idx;
  document.querySelectorAll('.doc-file-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const doc = docs[idx];
  const content = document.getElementById('docs-content');
  if (!content) return;

  const rendered = simpleMarkdown(doc.content || '');
  content.innerHTML = `
    <div class="docs-content-title">${escHtml(doc.title || doc.filename || '')}</div>
    ${doc.possibly_stale ? `<div style="font-size:11px;color:var(--orange);margin-bottom:8px">⚠ 此文档可能已过期</div>` : ''}
    <div class="markdown-body">${rendered}</div>`;
}

function copyAiCmd() {
  const el = document.getElementById('ai-cmd-text');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = el.textContent;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  });
  const btn = document.querySelector('.copy-btn');
  if (btn) { btn.textContent = '已复制!'; setTimeout(() => btn.textContent = '复制', 1500); }
}

// ─── Modal: 计划 ──────────────────────────────────────────────────────────────
function renderPlans(p) {
  const el = document.getElementById('mcontent-plans');
  const plans = p.plans || {};
  const files = plans.files || [];

  if (!files.length) {
    el.innerHTML = `<div class="placeholder">
      <div class="placeholder-icon">✅</div>
      <div class="placeholder-title">暂无计划文件</div>
    </div>`;
    return;
  }

  let html = '';

  // Overall progress
  html += `<div class="section">
    <div class="section-title">总体进度</div>
    ${progressBar(plans.done || 0, plans.total || 0)}
  </div>`;

  // Per file
  html += files.map(f => {
    const tasks = f.tasks || [];
    const done = tasks.filter(t => t.done).length;
    const total = tasks.length;

    return `<div class="plan-file">
      <div class="plan-file-name">${escHtml(f.filename || '')}</div>
      <div class="plan-progress-row">
        ${progressBar(done, total)}
      </div>
      <div class="task-list">
        ${tasks.map(t => `<div class="task-item">
          <span class="task-check ${t.done ? 'done' : 'todo'}">${t.done ? '✓' : '○'}</span>
          <span class="task-text ${t.done ? 'done' : 'todo'}">${escHtml(t.text || '')}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  el.innerHTML = html;
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── Generate Summary ─────────────────────────────────────────────────────────
async function generateSummary(projectId) {
  const btn = document.getElementById(`btn-summarize-${projectId}`);
  if (btn) { btn.disabled = true; btn.textContent = '生成中…'; }
  try {
    const res = await fetch(`/api/projects/${projectId}/summarize?force=true`, { method: 'POST' });
    const data = await res.json();
    if (res.ok && data.status === 'ok' && data.project) {
      currentProject = data.project;
      renderProjectOverview(currentProject);
    } else {
      const detail = data.detail || data.status || '未知错误';
      if (btn) { btn.disabled = false; btn.textContent = '↻ 重新生成'; }
      alert(`生成失败: ${detail}`);
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '↻ 重新生成'; }
    alert(`生成失败: ${e.message}`);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadProjects();
</script>
</body>
</html>
