// ─── Anomaly Detection ────────────────────────────────────────────────────────
let anomalies = [];  // {id, projectId, projectName, icon, title, desc}

function collectAnomalies(projects, wsSnapshot = {}) {
  const result = [];
  for (const p of projects) {
    const svc = p.service || {};
    const git = p.git || {};
    const docs = p.design_docs || [];

    // 1. Service down (has port but not running)
    const wsState = wsSnapshot[p.id];
    const isRunning = wsState !== undefined ? wsState.is_running : svc.is_running;
    if (svc.port && !isRunning) {
      result.push({ id: `svc-${p.id}`, projectId: p.id, projectName: p.name,
        icon: '🔴', title: `${p.name} 服务停止`, desc: `端口 ${svc.port} 无响应` });
    }

    // 2. Stale design docs
    const staleDocs = docs.filter(d => d.possibly_stale);
    if (staleDocs.length) {
      result.push({ id: `docs-${p.id}`, projectId: p.id, projectName: p.name,
        icon: '📄', title: `${p.name} 设计文档已过期`, desc: staleDocs.map(d => d.filename).join(', ') });
    }
  }
  return result;
}

function renderAnomalies() {
  const badge = document.getElementById('anomaly-badge');
  const list = document.getElementById('anomaly-list');
  const toggle = document.getElementById('anomaly-toggle');

  badge.textContent = anomalies.length;
  badge.className = anomalies.length === 0 ? 'ok' : '';
  toggle.style.borderColor = anomalies.length > 0 ? 'var(--red)' : '#444';

  if (anomalies.length === 0) {
    list.innerHTML = '<div style="padding:12px 14px;color:#666;font-size:12px">暂无异常 ✓</div>';
  } else {
    list.innerHTML = anomalies.map(a => `
      <div class="anomaly-item" onclick="event.stopPropagation();window.location.href='/projects/${escHtml(a.projectId)}'">
        <span class="anomaly-icon">${a.icon}</span>
        <div>
          <div class="anomaly-title">${escHtml(a.title)}</div>
          <div class="anomaly-desc">${escHtml(a.desc)}</div>
        </div>
      </div>`).join('');
  }
}

// ─── WebSocket Service Monitor ────────────────────────────────────────────────
let wsStatusPrev = {};  // {project_id: is_running}

function connectStatusWs() {
  const ws = new WebSocket(`ws://${location.host}/ws/status`);

  ws.onmessage = (e) => {
    const { snapshot, changes } = JSON.parse(e.data);

    // Update dot indicators on all visible cards without full re-render
    Object.entries(snapshot).forEach(([id, svc]) => {
      const dot = document.querySelector(`[data-svc-dot="${id}"]`);
      if (dot) {
        dot.className = 'svc-dot ' + (svc.is_running ? 'svc-running' : 'svc-stopped');
      }
      // Update card alert border
      const card = document.querySelector(`[data-project-id="${id}"]`);
      if (card) {
        card.classList.toggle('card-alert', !svc.is_running && wsStatusPrev[id] === true);
      }
    });

    // Toast on state changes (skip first snapshot)
    if (Object.keys(wsStatusPrev).length > 0) {
      Object.entries(changes).forEach(([id, svc]) => {
        const prev = wsStatusPrev[id];
        if (prev === undefined) return;  // newly discovered, skip
        const name = allProjects.find(p => p.id === id)?.name || id;
        if (!svc.is_running && prev === true) {
          showToast(`⚠️ ${name} 服务已停止 (port ${svc.port || '?'})`);
        } else if (svc.is_running && prev === false) {
          showToast(`✅ ${name} 服务已恢复 (port ${svc.port})`, true);
        }
      });
    }

    // Save prev state + update global snapshot
    Object.entries(snapshot).forEach(([id, svc]) => {
      wsStatusPrev[id] = svc.is_running;
    });
    wsStatusPrev.snapshot = snapshot;
    wsSnapshot = snapshot;

    // Refresh anomaly panel with latest service states
    anomalies = collectAnomalies(allProjects, snapshot);
    renderAnomalies();
  };

  ws.onclose = () => setTimeout(connectStatusWs, 5000);  // reconnect after 5s
}

// ─── Chat Agent ───────────────────────────────────────────────────────────────
let chatHistory = [];
let chatOpen = false;
let chatAlertsLoaded = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').classList.toggle('open', chatOpen);
  document.getElementById('chat-fab').style.display = chatOpen ? 'none' : '';
  if (chatOpen) {
    if (!chatAlertsLoaded) { chatAlertsLoaded = true; _loadAlerts(); }
    setTimeout(() => document.getElementById('chat-input').focus(), 260);
  }
}

async function _loadAlerts() {
  try {
    const res = await fetch('/api/alerts');
    const {alerts} = await res.json();
    if (alerts.length) {
      const el = document.createElement('div');
      el.className = 'chat-msg alert';
      el.textContent = '⚠ Mira 注意到：\n' + alerts.join('\n');
      document.getElementById('chat-messages').appendChild(el);
    }
  } catch(_) {}
}

function _appendChatMsg(role, text) {
  const el = document.createElement('div');
  el.className = `chat-msg ${role}`;
  el.textContent = text;
  document.getElementById('chat-messages').appendChild(el);
  document.getElementById('chat-messages').scrollTop = 999999;
  return el;
}

function _appendToolExec(command, output) {
  const el = document.createElement('div');
  el.className = 'chat-tool-exec';
  el.innerHTML =
    `<div class="chat-tool-cmd">$ ${escHtml(command)}</div>` +
    `<div class="chat-tool-out">${escHtml(output)}</div>`;
  document.getElementById('chat-messages').appendChild(el);
  document.getElementById('chat-messages').scrollTop = 999999;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;
  input.value = '';
  sendBtn.disabled = true;

  _appendChatMsg('user', text);
  const botEl = _appendChatMsg('assistant', '▍');
  let fullText = '';
  let reader;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, history: chatHistory}),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const parts = buf.split('\n\n');
      buf = parts.pop() ?? '';
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(part.slice(6)); } catch(_) { continue; }
        if (data.type === 'token') {
          fullText += data.content;
          botEl.textContent = fullText + '▍';
          document.getElementById('chat-messages').scrollTop = 999999;
        } else if (data.type === 'tool_exec') {
          _appendToolExec(data.command, data.output);
        } else if (data.type === 'error') {
          botEl.textContent = data.content;
          botEl.style.color = 'var(--red)';
        } else if (data.type === 'done') {
          botEl.textContent = fullText;
        }
      }
    }
    botEl.textContent = fullText || botEl.textContent.replace('▍', '');
    if (fullText) {
      chatHistory.push({role: 'user', content: text});
      chatHistory.push({role: 'assistant', content: fullText});
      if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
    }
  } catch(e) {
    botEl.textContent = '连接失败：' + e.message;
    botEl.style.color = 'var(--red)';
  } finally {
    reader?.cancel();
    sendBtn.disabled = false;
    input.focus();
  }
}

function applySkin(id) {
  const skin = SKINS.find(s => s.id === id) ? id : 'default';
  document.documentElement.dataset.theme = skin;
  localStorage.setItem('mira-skin', skin);
}

  const picker = document.getElementById('skin-picker');

  picker.innerHTML =

    SKINS.map(s =>
      `<div class="skin-card ${s.id === current ? 'active' : ''}"
            data-skin-id="${escHtml(s.id)}"
            onclick="applySkin(this.dataset.skinId);toggleSkinPicker();">
        <div class="skin-preview">
          <div style="background:${s.preview[0]}"></div>
          <div style="background:${s.preview[1]}"></div>
        </div>
        <div class="skin-name">${escHtml(s.name)}</div>
      </div>`
    ).join('') +
    `</div>`;
}

function toggleSkinPicker() {
  const picker = document.getElementById('skin-picker');
  const open = picker.classList.toggle('open');
  if (open) {

    picker.style.top = (rect.bottom + 8) + 'px';

}
