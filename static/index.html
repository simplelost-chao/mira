<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mira</title>
<style>
@font-face {
  font-family: 'Zpix';
  src: url('https://cdn.jsdelivr.net/gh/SolidZORO/zpix-pixel-font@v3.1.11/dist/zpix.ttf') format('truetype');
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2d3148;
  --accent: #4f46e5;
  --accent-dim: #3730a3;
  --text: #e2e8f0;
  --text-sec: #94a3b8;
  --text-muted: #64748b;
  --green: #22c55e;
  --green-dim: #34d399;
  --orange: #fb923c;
  --red: #ef4444;
  --purple: #a855f7;
  --yellow: #facc15;
  --accent-rgb: 79,70,229;
  --accent-light: #818cf8;
  --accent-light-rgb: 129,140,248;
  --card-deep: #0d1117;
  --text-deep: #3d4460;
  --border-subtle-rgb: 45,49,72;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', Consolas, monospace;
}

[data-theme="default"] {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2d3148;
  --accent: #4f46e5;
  --accent-dim: #3730a3;
  --accent-rgb: 79,70,229;
  --accent-light: #818cf8;
  --accent-light-rgb: 129,140,248;
  --text: #e2e8f0;
  --text-sec: #94a3b8;
  --text-muted: #64748b;
  --text-deep: #3d4460;
  --green: #22c55e;
  --green-dim: #34d399;
  --orange: #fb923c;
  --red: #ef4444;
  --purple: #a855f7;
  --yellow: #facc15;
  --card-deep: #0d1117;
  --border-subtle-rgb: 45,49,72;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', Consolas, monospace;
}

[data-theme="neon-pixel"] {
  --bg: #0a0a0a;
  --card: #1a1a1a;
  --border: #00ff00;
  --accent: #ff00ff;
  --accent-dim: #cc00cc;
  --accent-rgb: 255,0,255;
  --accent-light: #00ffff;
  --accent-light-rgb: 0,255,255;
  --text: #e0e0ff;
  --text-sec: #a0a0cc;
  --text-muted: #505070;
  --text-deep: #282840;
  --green: #00ff00;
  --green-dim: #00cc00;
  --orange: #ff8800;
  --red: #ff0040;
  --purple: #ff00ff;
  --yellow: #ffff00;
  --card-deep: #080808;
  --border-subtle-rgb: 0,255,0;
  --font-ui: 'Zpix', 'Ark Pixel Font', monospace;
  --font-mono: 'Zpix', 'Ark Pixel Font', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 52px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-right: 8px;
}
.tab-btn {
  background: none;
  border: none;
  color: var(--text-sec);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.tab-btn.active { background: var(--accent); color: #fff; }
.topbar-spacer { flex: 1; }
.refresh-btn {
  background: rgba(var(--accent-rgb),0.15);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 13px;
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.refresh-btn:hover { background: var(--accent); color: #fff; }
.refresh-btn.loading { opacity: 0.6; cursor: default; }


/* FILTER BAR */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-sec);
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.trend-tab { font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s; }
.trend-tab:hover { border-color:var(--accent);color:var(--text); }
.trend-tab.active { background:var(--accent);border-color:var(--accent);color:#fff; }
.trend-card { background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:border-color .15s; }
.trend-card:hover { border-color:rgba(var(--accent-light-rgb),.4); }
.trend-card-title { font-size:13px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px; }
.trend-card-desc { font-size:11px;color:var(--text-muted);line-height:1.5;flex:1; }
.trend-card-meta { display:flex;gap:12px;align-items:center;font-size:10px;color:var(--text-deep);margin-top:2px; }
.trend-card-lang { display:flex;align-items:center;gap:4px; }
.trend-lang-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
.filter-count {
  margin-left: 4px;
  font-size: 11px;
  opacity: 0.7;
}

/* PROJECT GRID */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* PROJECT CARD */
.project-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.project-card:hover {
  border-color: var(--accent);
  border-left-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(var(--accent-rgb),0.15);
}
.project-card.card-running {
  border-left-color: var(--green);
}
.project-card.card-running:hover {
  border-left-color: var(--green);
}
.card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 13px 16px 11px;
  border-bottom: 1px solid rgba(var(--border-subtle-rgb),0.6);
}
.card-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-active { background: rgba(34,197,94,0.12); color: var(--green); }
.status-paused { background: rgba(251,146,60,0.12); color: var(--orange); }
.status-done { background: rgba(168,85,247,0.12); color: var(--purple); }
.status-unknown { background: rgba(100,116,139,0.12); color: var(--text-muted); }
.status-badge-clickable { cursor: pointer; user-select: none; }
.status-badge-clickable:hover { filter: brightness(1.2); }
.status-dropdown-wrap { position: relative; }
.status-menu {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
  background: var(--card-deep); border: 1px solid rgba(255,255,255,.12); border-radius: 6px;
  overflow: hidden; min-width: 90px; box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
.status-menu.open { display: block; }
.status-opt {
  padding: 7px 12px; font-size: 11px; cursor: pointer; color: var(--text-sec);
  transition: background .1s;
}
.status-opt:hover { background: rgba(255,255,255,.06); color: var(--text); }
.status-opt.selected { color: var(--accent); }

.card-meta {
  display: flex;
  flex-direction: column;
  gap: 7px;
  padding: 11px 16px 13px;
}
.card-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-sec);
}
.card-row code {
  background: rgba(255,255,255,0.05);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}

/* Progress bar */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress-bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width 0.3s;
}
.progress-label { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

.card-divider { height: 1px; background: rgba(var(--border-subtle-rgb),0.5); margin: 2px 0; }

/* Service dot */
.svc-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.svc-running { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-green 2s infinite; }
.svc-stopped { background: var(--red); }
.svc-unknown { background: var(--text-muted); }
@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 4px var(--green); }
  50% { box-shadow: 0 0 10px var(--green); }
}
.card-alert { border-color: var(--red) !important; box-shadow: 0 0 12px rgba(224,108,117,0.3); }

/* ── C1 card layout ─────────────────────────────────────── */
.card-domain {
  margin: 10px 14px 0; padding: 8px 11px; border-radius: 7px;
  display: flex; align-items: center; gap: 7px;
  background: rgba(var(--accent-rgb),.06); border: 1px solid rgba(var(--accent-rgb),.14);
}
.card-domain-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 5px var(--green); flex-shrink: 0;
}
.card-domain-dot.off { background: var(--border); box-shadow: none; }
.card-domain-url {
  font-size: 12px; color: var(--accent-light); font-weight: 600; flex: 1;
  text-decoration: none; font-family: var(--font-mono);
}
.card-domain-url:hover { text-decoration: underline; }
.card-domain-nourl { font-size: 12px; color: var(--text-deep); flex: 1; font-family: var(--font-mono); }
.card-domain-meta { font-size: 10px; color: #4a5060; white-space: nowrap; }
.card-port-badge {
  font-size: 11px; color: #64748b; font-family: var(--font-mono);
  background: rgba(100,116,139,.12); border: 1px solid rgba(100,116,139,.2);
  border-radius: 4px; padding: 1px 6px; white-space: nowrap; flex-shrink: 0;
  text-decoration: none; transition: all .15s;
}
.card-port-badge:hover { color: var(--accent); border-color: var(--accent); background: rgba(var(--accent-rgb),.1); }

.card-stat-grid {
  display: flex; margin: 8px 14px 0;
  border: 1px solid rgba(255,255,255,.06); border-radius: 7px; overflow: hidden;
}
.card-stat {
  flex: 1; padding: 7px 6px; text-align: center;
  border-right: 1px solid rgba(255,255,255,.06);
}
.card-stat:last-child { border-right: none; }
.card-sv { font-size: 13px; font-weight: 700; color: var(--text); }
.card-sl { font-size: 8px; color: var(--text-deep); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.card-sv-purple { color: var(--accent-light); }
.card-sl-purple { color: #3d3060; }

.card-git-spark {
  display: flex; align-items: center; gap: 8px;
  margin: 7px 14px 0; font-size: 10px;
}
.card-git-spark code {
  font-size: 10px; background: rgba(255,255,255,.04);
  padding: 1px 5px; border-radius: 3px; color: #4a5060;
  font-family: var(--font-mono);
}
.card-spark {
  display: flex; gap: 2px; align-items: flex-end;
  margin-left: auto; height: 22px;
}
.card-spark-bar { width: 9px; border-radius: 1px; background: var(--card); }
.card-spark-bar.on { background: var(--accent); }

/* Claude mini block */
.card-claude-mini {
  margin: 7px 14px 0; padding: 8px 11px; border-radius: 7px;
  background: rgba(var(--accent-rgb),.04); border: 1px solid rgba(var(--accent-rgb),.1);
  display: flex; align-items: center; gap: 10px;
}
.card-claude-meta { flex: 1; }
.ccm-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
.ccm-lbl { flex: 1; font-size: 8px; color: #2d3555; letter-spacing: 1px; text-transform: uppercase; }
.ccm-val { flex: 1; font-size: 11px; font-weight: 600; color: #4a5060; }
.card-spark15 {
  display: flex; gap: 2px; align-items: flex-end; height: 44px; flex-shrink: 0;
}
.card-spark15-bar { width: 7px; border-radius: 1px 1px 0 0; background: #1e2538; min-height: 2px; }
.card-spark15-bar.on { background: var(--accent-light); }
.card-spark15-bar.hi { background: #a78bfa; }

.card-footer-new {
  padding: 9px 14px 13px; margin-top: 8px;
  border-top: 1px solid rgba(255,255,255,.04);
}
.card-footer-row {
  display: flex; flex-wrap: nowrap; gap: 4px;
  min-height: 20px; align-items: center; overflow: hidden;
}
.card-footer-row + .card-footer-row { margin-top: 5px; }
.card-svc-pill {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
}
.card-svc-pill.on {
  background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.15); color: #4a6a5a;
}
.card-svc-pill.off {
  background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); color: #334155;
}
.card-svc-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.card-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: rgba(255,255,255,.05); color: #64748b;
  white-space: nowrap;
}
.card-tag-more {
  font-size: 10px; padding: 1px 7px; border-radius: 3px;
  background: rgba(255,255,255,.05); color: #94a3b8;
  white-space: nowrap; cursor: default; position: relative;
}
.card-tag-more:hover .tag-more-tooltip {
  display: block;
}
.tag-more-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #1e2535;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 6px;
  padding: 6px 8px;
  display: none;
  flex-wrap: wrap;
  gap: 4px;
  min-width: max-content;
  max-width: 200px;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.card-tag-more:hover .tag-more-tooltip { display: flex; }

/* Toast */
#toast-container { position:fixed; bottom:24px; left:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast {
  background:#2a1a1a; border:1px solid var(--red); border-radius:6px;
  padding:10px 14px; font-size:13px; color:#e0e0e0; min-width:240px;
  animation: toast-in .2s ease; pointer-events:none;
}
.toast.toast-ok { background:#1a2a1a; border-color:var(--green); }
@keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* Anomaly toggle */
#anomaly-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 1000;
  background: #1e1e1e; border: 1px solid #444; border-radius: 8px;
  cursor: pointer; user-select: none;
}
#anomaly-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; font-size: 13px; color: #ccc;
}
#anomaly-badge {
  background: var(--red); color: #fff; border-radius: 10px;
  font-size: 11px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center;
}
#anomaly-badge.ok { background: var(--green); }
#anomaly-panel {
  display: none; border-top: 1px solid #333;
  max-height: 320px; overflow-y: auto; width: 320px;
}
#anomaly-panel.open { display: block; }
.anomaly-item {
  padding: 8px 14px; font-size: 12px; border-bottom: 1px solid #2a2a2a;
  display: flex; gap: 8px; align-items: flex-start; cursor: pointer;
}
.anomaly-item:hover { background: #252525; }
.anomaly-item:last-child { border-bottom: none; }
.anomaly-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
.anomaly-title { color: #e0e0e0; font-weight: 500; }
.anomaly-desc { color: #888; font-size: 11px; margin-top: 2px; }

/* Tech stack tags */
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.tag {
  background: rgba(var(--accent-rgb),0.1);
  border: 1px solid rgba(var(--accent-rgb),0.3);
  color: #a5b4fc;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
}
.tag-more { color: var(--text-muted); font-size: 10px; align-self: center; }

/* GLOBAL TAB */
.kpi-row {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 22px;
  display: flex;
  align-items: center;
  gap: 0;
}
.kpi-accent-bar {
  width: 3px;
  border-radius: 2px;
  align-self: stretch;
  flex-shrink: 0;
  margin-right: 14px;
}
.kpi-inner { display: flex; gap: 18px; align-items: center; }
.kpi-stat { display: flex; flex-direction: column; gap: 4px; }
.kpi-vdiv { width: 1px; background: rgba(255,255,255,.06); align-self: stretch; }
.kpi-label { font-size: 10px; color: var(--text-muted); letter-spacing: .3px; }
.kpi-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
.kpi-green { color: var(--green); }
.kpi-orange { color: var(--orange); }
.kpi-accent { color: var(--accent); }
.kpi-yellow { color: var(--yellow); }
.kpi-purple { color: var(--purple); }
.kpi-muted { color: #94a3b8; }

.summary-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--card);
  border-radius: 10px;
  overflow: hidden;
}
.summary-table th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  padding: 10px 14px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--border);
}
.summary-table td {
  padding: 10px 14px;
  font-size: 13px;
  border-bottom: 1px solid rgba(var(--border-subtle-rgb),0.5);
  vertical-align: middle;
}
.summary-table tr:last-child td { border-bottom: none; }
.summary-table tr:hover td { background: rgba(255,255,255,0.02); }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 900px;
  min-height: 600px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.modal-path {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.modal-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.modal-close:hover { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

.modal-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 24px 0;
  border-bottom: 1px solid var(--border);
}
.modal-tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: var(--text-sec);
  font-size: 13px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.modal-tab-btn:hover { color: var(--text); }
.modal-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.modal-body {
  padding: 20px 24px;
  flex: 1;
  overflow-y: auto;
}
.modal-footer {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  background: #0e1114;
  border-radius: 0 0 12px 12px;
  min-height: 44px;
}
#delete-init-btn:hover { border-color: #7a3030; color: #c06060; }
.modal-tab-content { display: none; }
.modal-tab-content.active { display: block; }

/* SECTIONS */
.section {
  margin-bottom: 24px;
}
.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* ── OVERVIEW HERO ─────────────────────────────────────────────── */
.ov-hero {
  background: linear-gradient(135deg, #141a1f 0%, #1a1f2a 100%);
  border: 1px solid #2a3040;
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 18px;
  position: relative;
}
.ov-hero-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.ov-hero-oneliner {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.6;
  margin-bottom: 12px;
}
.ov-hero-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.ov-badge {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 20px;
  border: 1px solid;
  font-weight: 500;
}
.ov-badge-running { background: rgba(82,196,105,.12); border-color: rgba(82,196,105,.35); color: #52c469; }
.ov-badge-stopped { background: rgba(224,108,117,.1); border-color: rgba(224,108,117,.3); color: #e06c75; }
.ov-badge-deploy  { background: rgba(97,175,239,.1); border-color: rgba(97,175,239,.3); color: #61afef; }
.ov-badge-status  { background: rgba(255,255,255,.06); border-color: #333; color: #aaa; }
.ov-regen-btn {
  position: absolute; top: 16px; right: 16px;
  font-size: 11px; padding: 3px 10px; cursor: pointer;
  border: 1px solid #333; border-radius: 4px;
  background: #1e1e1e; color: #777;
}
.ov-regen-btn:hover { border-color: #555; color: #aaa; }

/* ── TWO-COLUMN LAYOUT ─────────────────────────────────────────── */
.ov-cols {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 16px;
  margin-bottom: 18px;
  align-items: start;
}
@media (max-width: 700px) { .ov-cols { grid-template-columns: 1fr; } }

/* ── ARCH MARKDOWN ─────────────────────────────────────────────── */
.arch-text {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.75;
  background: #111418;
  border: 1px solid #1e2530;
  border-radius: 8px;
  padding: 16px 18px;
}
.arch-text h1,.arch-text h2,.arch-text h3 {
  color: var(--text);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-muted);
  margin: 14px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid #1e2530;
}
.arch-text h1:first-child,.arch-text h2:first-child,.arch-text h3:first-child { margin-top: 0; }
.arch-text p { margin: 0 0 8px; }
.arch-text ul { margin: 4px 0 8px 16px; padding: 0; }
.arch-text li { margin-bottom: 3px; }
.arch-text strong { color: #c8ccd4; }
.arch-text code { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:3px; padding:1px 5px; font-size:11px; color:#61afef; }
.arch-text pre { background:#0e1114; border:1px solid #2a2a2a; border-radius:6px; padding:10px 12px; overflow-x:auto; }
.arch-text pre code { background:none; border:none; padding:0; }

/* ── TECH STACK PANEL ──────────────────────────────────────────── */
.ov-tech-panel {
  background: #111418;
  border: 1px solid #1e2530;
  border-radius: 8px;
  padding: 14px 15px;
}
.ov-tech-panel-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.ov-tech-group { margin-bottom: 10px; }
.ov-tech-group-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: #444;
  margin-bottom: 5px;
  font-weight: 600;
}
.ov-tech-pills { display: flex; flex-wrap: wrap; gap: 4px; }
.ov-tech-pill {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid;
  line-height: 1.4;
}
.pill-lang   { background:rgba(97,175,239,.1);  border-color:rgba(97,175,239,.25);  color:#61afef; }
.pill-db     { background:rgba(229,192,123,.1);  border-color:rgba(229,192,123,.25); color:#e5c07b; }
.pill-ai     { background:rgba(198,120,221,.1);  border-color:rgba(198,120,221,.25); color:#c678dd; }
.pill-web    { background:rgba(82,196,105,.1);   border-color:rgba(82,196,105,.25);  color:#52c469; }
.pill-infra  { background:rgba(255,255,255,.07); border-color:#2a2a2a;               color:#888; }

/* ── SERVICE MAP ───────────────────────────────────────────────── */
.ov-svc-map {
  background: #0e1114;
  border: 1px solid #1e2530;
  border-radius: 8px;
  padding: 16px 18px;
  margin-bottom: 18px;
}
.ov-svc-map-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 14px;
}
.ov-svc-flow {
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: wrap;
  row-gap: 10px;
}
.ov-svc-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.ov-svc-node-box {
  font-size: 12px;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 7px;
  border: 1.5px solid;
  white-space: nowrap;
}
.ov-svc-node-box.self  { background:rgba(97,175,239,.12); border-color:rgba(97,175,239,.4); color:#61afef; }
.ov-svc-node-box.ext   { background:#141a1f; border-color:#2a3040; color:#aaa; }
.ov-svc-node-box.ext.shared { border-color:rgba(165,180,252,.35); color:#a5b4fc; }
.ov-svc-node-meta { font-size: 10px; color: #555; }
.ov-svc-arrow {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  padding: 0 6px;
  color: #333;
  font-size: 16px;
}
.ov-svc-shared-badge {
  font-size: 9px;
  background: rgba(165,180,252,.1);
  border: 1px solid rgba(165,180,252,.25);
  color: #a5b4fc;
  border-radius: 10px;
  padding: 1px 6px;
  white-space: nowrap;
}

/* ── BOTTOM DATA ROW ───────────────────────────────────────────── */
.ov-data-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 18px;
}
@media (max-width: 700px) { .ov-data-row { grid-template-columns: 1fr; } }
.ov-data-card {
  background: #111418;
  border: 1px solid #1e2530;
  border-radius: 8px;
  padding: 14px 15px;
}
.ov-data-card-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.ov-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ov-stat { display: flex; flex-direction: column; gap: 2px; }
.ov-stat-val { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.ov-stat-label { font-size: 10px; color: var(--text-muted); }
.ov-git-items { display: flex; flex-direction: column; gap: 6px; }
.ov-git-kv { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
.ov-git-kv .k { color: var(--text-muted); }
.ov-git-kv .v { color: var(--text); font-family: var(--font-mono); }
.ov-lang-list { display: flex; flex-direction: column; gap: 5px; }
.ov-lang-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.ov-lang-name { width: 70px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ov-lang-track { flex: 1; height: 4px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
.ov-lang-fill { height: 100%; border-radius: 2px; }
.ov-lang-num { width: 45px; text-align: right; color: #555; }

/* GIT STATUS */
.git-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.git-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.git-item .key { color: var(--text-muted); }
.git-item .val { color: var(--text); font-family: var(--font-mono); }
.dirty-files { margin-top: 8px; }
.dirty-file {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 0;
}
.dirty-M { color: var(--orange); }
.dirty-A { color: var(--green); }
.dirty-D { color: var(--red); }
.dirty-QQ { color: var(--text-muted); }
.recent-commits {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.commit-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: var(--text-sec);
}
.commit-hash {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  flex-shrink: 0;
  padding-top: 1px;
}
.commit-msg { color: var(--text-sec); }

/* DEPLOY */
.deploy-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(var(--accent-rgb),0.15);
  color: #a5b4fc;
  margin-bottom: 8px;
}
.deploy-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 16px; font-size: 12px; }
.deploy-key { color: var(--text-muted); }
.deploy-val { color: var(--text); }
.deploy-val a { color: var(--accent); text-decoration: none; }
.deploy-val a:hover { text-decoration: underline; }
.deploy-cmd {
  margin-top: 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--green-dim);
  white-space: pre-wrap;
  word-break: break-all;
}

/* LOC */
.mini-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.mini-stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  flex: 1;
  min-width: 100px;
}
.mini-stat-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.mini-stat-value { font-size: 18px; font-weight: 600; color: var(--text); }

.lang-bar { display: flex; flex-direction: column; gap: 6px; }
.lang-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.lang-name { width: 100px; color: var(--text-sec); flex-shrink: 0; }
.lang-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.lang-fill { height: 100%; border-radius: 3px; }
.lang-count { width: 60px; text-align: right; color: var(--text-muted); flex-shrink: 0; }

/* FEATURES */
.feature-list { display: flex; flex-direction: column; gap: 6px; }
.feature-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
}
.feature-check { flex-shrink: 0; width: 16px; text-align: center; }
.feature-check.done { color: var(--green); }
.feature-check.planned { color: var(--text-muted); }
.feature-text { color: var(--text-sec); flex: 1; }
.feature-source {
  font-size: 10px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* DESIGN DOCS */
.docs-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
  min-height: 400px;
}
.docs-sidebar {
  border-right: 1px solid var(--border);
  padding-right: 16px;
}
.docs-sidebar-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.doc-file-item {
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-sec);
  margin-bottom: 2px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.doc-file-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.doc-file-item.active { background: rgba(var(--accent-rgb),0.15); color: var(--accent); }
.stale-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--orange);
  flex-shrink: 0;
  margin-left: auto;
}

.docs-content { overflow: hidden; }
.docs-content-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}
.markdown-body {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.7;
}
.markdown-body h1, .markdown-body h2, .markdown-body h3 {
  color: var(--text);
  margin: 16px 0 8px;
  font-weight: 600;
}
.markdown-body h1 { font-size: 18px; }
.markdown-body h2 { font-size: 15px; }
.markdown-body h3 { font-size: 13px; }
.markdown-body p { margin-bottom: 8px; }
.markdown-body ul, .markdown-body ol { margin: 6px 0 6px 20px; }
.markdown-body li { margin-bottom: 2px; }
.markdown-body code {
  background: rgba(255,255,255,0.07);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: #c4b5fd;
}
.markdown-body pre {
  background: rgba(0,0,0,0.35);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
}
.markdown-body pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  color: var(--green-dim);
}
.markdown-body strong { color: var(--text); font-weight: 600; }
.markdown-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}
.markdown-body blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--text-muted);
  margin: 8px 0;
}

.ai-cmd-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.ai-cmd-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.ai-cmd-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--green-dim);
}
.ai-cmd-text { flex: 1; word-break: break-all; }
.copy-btn {
  background: rgba(var(--accent-rgb),0.15);
  border: 1px solid rgba(var(--accent-rgb),0.4);
  color: var(--accent);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.copy-btn:hover { background: var(--accent); color: #fff; }

/* PLANS */
.plan-file {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 14px;
}
.plan-file-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  font-family: var(--font-mono);
}
.plan-progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.task-list { display: flex; flex-direction: column; gap: 4px; }
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  padding: 2px 0;
}
.task-check { flex-shrink: 0; }
.task-check.done { color: var(--green); }
.task-check.todo { color: var(--text-muted); }
.task-text.done { color: var(--text-muted); text-decoration: line-through; }
.task-text.todo { color: var(--text-sec); }

/* PLACEHOLDER */
.placeholder {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.placeholder-icon { font-size: 36px; margin-bottom: 12px; }
.placeholder-title { font-size: 15px; color: var(--text-sec); margin-bottom: 6px; }

/* ERROR STATE */
.error-state {
  text-align: center;
  padding: 40px;
  color: var(--red);
  font-size: 13px;
}

/* LOADING */
.loading-state {
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
  font-size: 13px;
}

/* EMPTY */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── infra services ── */
.infra-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-muted); margin: 0 0 14px;
}
.infra-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px; margin-bottom: 32px;
}
.infra-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px;
  transition: border-color .15s;
}
.infra-card:hover { border-color: rgba(255,255,255,.15); }
.infra-card.running { border-left: 3px solid var(--green); }
.infra-card.stopped { border-left: 3px solid rgba(255,255,255,.08); }
.infra-icon {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.infra-icon.llm     { background: rgba(var(--accent-rgb),.15); }
.infra-icon.voice   { background: rgba(92,208,138,.12); }
.infra-icon.http    { background: rgba(78,158,255,.12); }
.infra-icon.wiki    { background: rgba(217,179,107,.12); }
.infra-icon.storage { background: rgba(229,166,80,.12); }
.infra-icon.db      { background: rgba(176,124,255,.12); }
.infra-icon.other   { background: rgba(255,255,255,.05); }
.infra-body { flex: 1; min-width: 0; }
.infra-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.infra-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.infra-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.infra-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.infra-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.infra-dot.off { background: var(--text-muted); }
.infra-status.on  { color: var(--green); }
.infra-status.off { color: var(--text-muted); }
.infra-port { color: var(--text-muted); }

/* ── RESPONSIVE ────────────────────────────────────────────────── */
@media (max-width: 640px) {
  /* Topbar */
  .topbar { padding: 0 14px; gap: 8px; height: 48px; }
  .topbar-title { font-size: 14px; }
  .refresh-btn { font-size: 12px; padding: 4px 10px; }

  /* Main page padding */
  #panel-overview { padding: 0 12px 48px !important; }
  .kpi-row { margin-top: 16px !important; }

  /* KPI: stack on mobile */
  .kpi-row { flex-direction: column; gap: 8px; }
  .kpi-card { padding: 14px 16px; }
  .kpi-value { font-size: 18px; }
  .kpi-inner { gap: 14px; flex-wrap: wrap; }

  /* Filter bar */
  .filter-bar { gap: 6px; margin-bottom: 14px; }
  .filter-btn { font-size: 11px; padding: 3px 10px; }

  /* Project grid: single column */
  .project-grid { grid-template-columns: 1fr; gap: 10px; }

  /* Summary table: scroll horizontally */
  #summary-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; font-size: 12px; }
  .summary-table th, .summary-table td { padding: 8px 10px; white-space: nowrap; }

  /* Anomaly toggle */
  #anomaly-toggle { bottom: 14px; right: 14px; }
  #anomaly-panel { width: calc(100vw - 28px); max-width: 320px; }

  /* Modal: fullscreen on mobile */
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%;

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allProjects = [];
let allBaseServices = [];
let currentFilter = 'active';
let currentProject = null;
let currentDocIdx = 0;
let currentModalTab = 'overview';
let wsSnapshot = {};  // projectId -> {is_running, port}

// ─── Utility ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function simpleMarkdown(md) {
  if (!md) return '';
  let html = escHtml(md);
  // Code blocks (must come before inline code)
  html = html.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // H1-H3
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // HR
  html = html.replace(/^---+$/gm, '<hr>');
  // Blockquote
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered list items
  html = html.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
  // Ordered list items
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Paragraphs (lines not starting with html tags)
  html = html.replace(/^(?!<[a-z]|$)(.+)$/gm, '<p>$1</p>');
  return html;
}

function kpiCard(label, value, colorClass) {
  return `<div class="kpi-card">
    <div class="kpi-label">${escHtml(label)}</div>
    <div class="kpi-value ${colorClass || ''}">${escHtml(String(value))}</div>
  </div>`;
}

function kpiCard2(labelA, valueA, colorA, labelB, valueB, colorB) {
  return `<div class="kpi-card" style="display:flex;gap:16px">
    <div style="flex:1;min-width:0">
      <div class="kpi-label">${escHtml(labelA)}</div>
      <div class="kpi-value ${colorA || ''}" style="font-size:22px">${escHtml(String(valueA))}</div>
    </div>
    <div style="width:1px;background:var(--border);flex-shrink:0"></div>
    <div style="flex:1;min-width:0">
      <div class="kpi-label">${escHtml(labelB)}</div>
      <div class="kpi-value ${colorB || ''}" style="font-size:22px">${escHtml(String(valueB))}</div>
    </div>
  </div>`;
}

function miniStat(label, value) {
  return `<div class="mini-stat">
    <div class="mini-stat-label">${escHtml(label)}</div>
    <div class="mini-stat-value">${escHtml(String(value))}</div>
  </div>`;
}

const STATUS_META = {
  active: { label: 'Active', cls: 'status-active' },
  paused: { label: 'Paused', cls: 'status-paused' },
  done:   { label: 'Done',   cls: 'status-done' },
  trash:  { label: 'Trash',  cls: 'status-unknown' },
};

function statusBadge(status) {
  const { label, cls } = STATUS_META[status] || { label: status || 'Unknown', cls: 'status-unknown' };
  return `<span class="status-badge ${cls}">${escHtml(label)}</span>`;
}

function statusDropdown(projectId, status) {
  const { label, cls } = STATUS_META[status] || { label: status || 'Unknown', cls: 'status-unknown' };
  const opts = Object.entries(STATUS_META).map(([k, v]) =>
    `<div class="status-opt${k === status ? ' selected' : ''}" onclick="event.stopPropagation();setStatus('${escHtml(projectId)}','${k}',this)">${v.label}</div>`
  ).join('');
  return `<div class="status-dropdown-wrap" onclick="event.stopPropagation();toggleStatusMenu(this)">
    <span class="status-badge ${cls} status-badge-clickable">${escHtml(label)} ▾</span>
    <div class="status-menu">${opts}</div>
  </div>`;
}

async function setStatus(projectId, newStatus, optEl) {
  const wrap = optEl.closest('.status-dropdown-wrap');
  try {
    const res = await fetch(`/api/projects/${encodeURIComponent(projectId)}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    if (!res.ok) throw new Error(await res.text());
    // Update local state
    const p = allProjects.find(p => p.id === projectId);
    if (p) p.status = newStatus;
    // Update badge (works for both card .status-badge and modal .ov-badge-status)
    const { label, cls } = STATUS_META[newStatus] || {};
    const badge = wrap.querySelector('.status-badge, .ov-badge-status');
    if (badge) {
      if (badge.classList.contains('status-badge')) {
        badge.className = `status-badge ${cls} status-badge-clickable`;
      }
      badge.textContent = label + ' ▾';
    }
    wrap.querySelectorAll('.status-opt').forEach(o => o.classList.toggle('selected', o.textContent.trim() === label));
    wrap.querySelector('.status-menu').classList.remove('open');
    updateFilterCounts();
    renderCards();
  } catch(e) {
    console.error('setStatus failed', e);
  }
}

function toggleStatusMenu(wrap) {
  const menu = wrap.querySelector('.status-menu');
  const isOpen = menu.classList.contains('open');
  // Close all others
  document.querySelectorAll('.status-menu.open').forEach(m => m.classList.remove('open'));
  if (!isOpen) menu.classList.add('open');
}

// Close status menus on outside click
document.addEventListener('click', () => {
  document.querySelectorAll('.status-menu.open').forEach(m => m.classList.remove('open'));
});

function svcDot(svc, id) {
  const attr = id ? ` data-svc-dot="${escHtml(id)}"` : '';
  if (!svc) return `<span class="svc-dot svc-unknown"${attr}></span>`;
  if (svc.is_running) return `<span class="svc-dot svc-running"${attr}></span>`;
  return `<span class="svc-dot svc-stopped"${attr}></span>`;
}

function planPct(plans) {
  if (!plans || plans.total === 0) return 0;
  return Math.round((plans.done / plans.total) * 100);
}

function progressBar(done, total, width) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  const wStyle = width ? `width:${width};` : '';
  return `<div class="progress-wrap" style="${wStyle}">
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <span class="progress-label">${done}/${total} (${pct}%)</span>
  </div>`;
}

// ─── Load Projects ────────────────────────────────────────────────────────────
async function loadProjects() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ 加载中…';
  try {
    const res = await fetch('/api/projects');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allProjects = await res.json();
    renderCards();
    renderGlobal();
    loadTrending('weekly', document.querySelector('.trend-tab[data-period="weekly"]'));
    anomalies = collectAnomalies(allProjects, wsStatusPrev.snapshot || {});
    renderAnomalies();
    updateFilterCounts();
  } catch (e) {
    document.getElementById('project-grid').innerHTML =
      `<div class="error-state">⚠ 加载失败: ${escHtml(e.message)}</div>`;
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '↻ 刷新';
  }
}

function updateFilterCounts() {
  const counts = { all: 0, active: 0, paused: 0, done: 0, trash: 0 };
  for (const p of allProjects) {
    const s = p.status || 'active';
    if (s in counts) counts[s]++;
    if (s !== 'trash') counts.all++;  // "全部" excludes trash
  }
  document.getElementById('count-all').textContent = counts.all;
  document.getElementById('count-active').textContent = counts.active;
  document.getElementById('count-paused').textContent = counts.paused;
  document.getElementById('count-done').textContent = counts.done;
  document.getElementById('count-trash').textContent = counts.trash;
}


function setFilter(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ─── Card Rendering ───────────────────────────────────────────────────────────
function renderCards() {
  let filtered;
  if (currentFilter === 'all') {
    filtered = allProjects.filter(p => (p.status || 'active') !== 'trash');
  } else {
    filtered = allProjects.filter(p => (p.status || 'active') === currentFilter);
  }

  const grid = document.getElementById('project-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">暂无项目</div>';
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

const DEPLOY_ICONS = {
  ec2: '☁️', gcp: '☁️', azure: '☁️', lightsail: '☁️',
  netlify: '🌐', vercel: '▲', heroku: '🟣', railway: '🚄',
  render: '🎨', docker: '🐳', vps: '🖥️', codedeploy: '☁️', gae: '☁️',
};
function deployLabel(deploy) {
  if (!deploy || deploy.type === 'none' || !deploy.type) return null;
  const icon = DEPLOY_ICONS[deploy.type] || '☁️';
  const label = deploy.type.toUpperCase();
  const title = deploy.host ? ` title="${escHtml(deploy.host)}"` : '';
  return `${icon} <span style="color:var(--accent);cursor:default"${title}>${label}</span>`;
}

function renderCard(p) {
  const git = p.git || {};
  const svc = p.service || {};
  const deploy = p.deploy || {};
  const loc = p.loc || {};
  const ca = p.claude_activity;
  const allTags = p.tech_stack || [];
  const tags = allTags.slice(0, 4);
  const moreTags = allTags.slice(4);
  const isRunning = svc.is_running;
  const deps = allBaseServices.filter(s => (s.used_by || []).includes(p.id));

  // ── Domain block (C1 style) ──────────────────────────────
  const deployIcon = deploy.type && deploy.type !== 'none'
    ? ` · ${DEPLOY_ICONS[deploy.type] || '☁️'} ${deploy.type.toUpperCase()}`
    : '';
  const deployMeta = deploy.type && deploy.type !== 'none'
    ? `<span class="card-domain-meta">${DEPLOY_ICONS[deploy.type] || '☁️'} ${deploy.type.toUpperCase()}</span>`
    : '';
  const portBadge = svc.port
    ? `<a class="card-port-badge" href="http://localhost:${svc.port}" target="_blank"
         onclick="event.stopPropagation()" title="本地 :${svc.port}">:${svc.port}</a>`
    : '';
  const domainBlock = `
    <div class="card-domain">
      <span class="card-domain-dot${isRunning ? '' : ' off'}"></span>
      ${svc.public_domain
        ? `<a class="card-domain-url" href="https://${escHtml(svc.public_domain)}" target="_blank"
             onclick="event.stopPropagation()">${escHtml(svc.public_domain)}</a>`
        : `<span class="card-domain-nourl">无公开域名</span>`}
      ${portBadge}
      ${deployMeta}
    </div>`;

  // ── Stats grid: commits | files | lines | Claude cost ───
  const claudeCostVal = (() => {
    if (!ca) return '—';
    const c = ca.estimated_cost_usd || 0;
    if (c === 0) return '—';
    if (c < 1) return `$${c.toFixed(2)}`;
    if (c < 100) return `$${c.toFixed(1)}`;
    return `$${Math.round(c)}`;
  })();
  const claudeIsRecent = ca && ca.last_session && (Date.now() - new Date(ca.last_session)) < 7 * 86400000;
  const claudeTip = (() => {
    if (!ca) return 'Claude 无记录';
    const parts = [];
    if (ca.last_session) {
      const diffH = Math.floor((Date.now() - new Date(ca.last_session)) / 3600000);
      const diffD = Math.floor(diffH / 24);
      parts.push(`上次: ${diffH < 1 ? '刚刚' : diffH < 24 ? diffH + 'h前' : diffD + 'd前'}`);
    }
    if (ca.session_count_7d) parts.push(`7天 ${ca.session_count_7d} 次`);
    if (ca.output_tokens) parts.push(`输出 ${fmtNum(ca.output_tokens)} tok`);
    if (ca.estimated_cost_usd) parts.push(`≈ $${ca.estimated_cost_usd.toFixed(2)}`);
    return parts.join(' · ');
  })();
  const statGrid = `
    <div class="card-stat-grid">
      <div class="card-stat" title="本月提交数">
        <div class="card-sv">↑${git.monthly_commits || 0}</div>
        <div class="card-sl">提交/月</div>
      </div>
      <div class="card-stat" title="文件总数">
        <div class="card-sv">${fmtNum(loc.file_count || 0)}</div>
        <div class="card-sl">文件</div>
      </div>
      <div class="card-stat" title="代码行数">
        <div class="card-sv">${fmtNum(loc.code_lines || 0)}</div>
        <div class="card-sl">行代码</div>
      </div>
      <div class="card-stat" title="${escHtml(claudeTip)}">
        <div class="card-sv ${claudeIsRecent ? 'card-sv-purple' : ''}">${claudeCostVal}</div>
        <div class="card-sl ${claudeIsRecent ? 'card-sl-purple' : ''}">Claude</div>
      </div>
    </div>`;

  // ── Git row (no sparkline) ────────────────────────────────
  const gitSparkRow = `
    <div class="card-git-spark">
      <code>${escHtml(git.branch || '—')}</code>
      <code>${escHtml((git.commit_hash || '').slice(0, 7) || '—')}</code>
      <span style="margin-left:auto;font-size:10px;color:#2d3555">↑${git.monthly_commits || 0}/月</span>
    </div>`;

  // ── Claude mini block (option B) ─────────────────────────
  const spark15 = ca && ca.session_spark_15d && ca.session_spark_15d.length === 15
    ? ca.session_spark_15d : Array(15).fill(0);
  const spark15Max = Math.max(...spark15, 1);
  const spark15Bars = spark15.map(v => {
    const h = v === 0 ? 100 : Math.min(100, Math.max(15, Math.round((v / 12) * 100)));
    const cls = v === 0 ? '' : v >= 12 ? ' hi' : v >= spark15Max * 0.7 ? ' hi' : ' on';
    return `<span class="card-spark15-bar${cls}" style="height:${h}%" title="${v.toFixed(1)}h 活跃"></span>`;
  }).join('');

  const fmtTok = t => t >= 1e9 ? (t/1e9).toFixed(1)+'B' : t >= 1e6 ? (t/1e6).toFixed(1)+'M' : t >= 1e3 ? (t/1e3).toFixed(0)+'k' : String(t);
  const claudeLastStr = (() => {
    if (!ca || !ca.last_session) return '—';
    const diffH = Math.floor((Date.now() - new Date(ca.last_session)) / 3600000);
    const diffD = Math.floor(diffH / 24);
    return diffH < 1 ? '刚刚' : diffH < 24 ? `${diffH}h前` : `${diffD}d前`;
  })();
  const claudeMiniBlock = `
    <div class="card-claude-mini">
      <div class="card-claude-meta">
        <div class="ccm-row"><span class="ccm-lbl">上次</span><span class="ccm-lbl">活跃</span><span class="ccm-lbl">30天会话</span></div>
        <div class="ccm-row"><span class="ccm-val">${claudeLastStr}</span><span class="ccm-val">${ca ? (ca.active_hours||0) + 'h' : '—'}</span><span class="ccm-val">${ca ? ca.session_count_30d||0 : '—'}</span></div>
        <div class="ccm-row" style="margin-top:4px"><span class="ccm-lbl">输出</span><span class="ccm-lbl">输入</span><span class="ccm-lbl">Cache读</span></div>
        <div class="ccm-row"><span class="ccm-val">${ca ? fmtTok(ca.output_tokens||0) : '—'}</span><span class="ccm-val">${ca ? fmtTok(ca.input_tokens||0) : '—'}</span><span class="ccm-val">${ca ? fmtTok(ca.cache_read_tokens||0) : '—'}</span></div>
      </div>
      <div class="card-spark15">${spark15Bars}</div>
    </div>`;

  // ── Footer: row1=services, row2=tags ─────────────────────
  const svcPills = deps.map(s => {
    const on = s.is_running;
    return `<span class="card-svc-pill ${on ? 'on' : 'off'}">
      ${_INFRA_ICONS[s.type] || '⚙️'} ${escHtml(s.name)}
      <span class="card-svc-dot" style="background:${on ? 'var(--green)' : '#334155'}"></span>
    </span>`;
  }).join('');
  const tagSpans = tags.map(t => `<span class="card-tag">${escHtml(t.name || t)}</span>`).join('');
  const moreTag = moreTags.length > 0
    ? `<span class="card-tag-more">+${moreTags.length}</span>`
    : '';
  const footer = `
    <div class="card-footer-new">
      <div class="card-footer-row">${svcPills}</div>
      <div class="card-footer-row">${tagSpans}${moreTag}</div>
    </div>`;

  return `<div class="project-card${isRunning ? ' card-running' : ''}" data-project-id="${escHtml(p.id)}">
    <div class="card-header">
      ${isRunning
        ? `<span style="width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);flex-shrink:0;animation:pulse-green 2s infinite"></span>`
        : `<span style="width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0"></span>`}
      <span class="card-name">${escHtml(p.name)}</span>
      ${statusDropdown(p.id, p.status || 'active')}
      <a href="/projects/${escHtml(p.id)}" target="_blank"
         onclick="event.stopPropagation()"
         title="在新标签页打开" style="margin-left:auto;font-size:13px;color:var(--text-muted);text-decoration:none;transition:color .15s"
         onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">↗</a>
    </div>
    ${domainBlock}
    ${statGrid}
    ${gitSparkRow}
    ${claudeMiniBlock}
    ${footer}
  </div>`;
}

let _trendingCache = {};

async function loadTrending(period = 'daily', btn) {
  document.querySelectorAll('.trend-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const grid = document.getElementById('trending-grid');
  if (_trendingCache[period]) { renderTrending(_trendingCache[period]); return; }

  grid.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:12px">加载中...</div>';

  try {
    const res = await fetch(`/api/trending?period=${period}`);
    if (!res.ok) throw new Error(res.status);
    const items = await res.json();
    _trendingCache[period] = items || [];
    renderTrending(_trendingCache[period]);
  } catch(e) {
    grid.innerHTML = `<div style="color:var(--text-muted);font-size:12px;padding:12px">加载失败: ${e.message}</div>`;
  }
}

function renderTrending(repos) {
  const grid = document.getElementById('trending-grid');
  if (!repos.length) { grid.innerHTML = '<div style="color:var(--text-muted);font-size:12px">暂无数据</div>'; return; }
  grid.innerHTML = repos.map(r => {
    const lang = r.language || '';
    const dot = lang ? `<span class="trend-lang-dot" style="background:${LANG_COLOR_MAP[lang]||'#555'}"></span>` : '';
    const desc = r.description ? r.description.slice(0,80) + (r.description.length>80?'…':'') : '暂无描述';
    const stars = r.stargazers_count >= 1000 ? (r.stargazers_count/1000).toFixed(1)+'k' : r.stargazers_count;
    return `<div class="trend-card" onclick="window.open('${r.html_url}','_blank')">

  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';

}

         >${escHtml(domain)}</a>`
      : `<span style="color:var(--text-muted)">—</span>`;

    return `<tr data-project-id="${escHtml(p.id)}" style="cursor:pointer">
      <td>${escHtml(p.name)}</td>
      <td>${statusBadge(p.status)}</td>
      <td style="display:flex;align-items:center;gap:6px">${svcCell}</td>
      <td>${domainCell}</td>
      <td style="font-size:12px">${dLabel || '<span style="color:var(--text-muted)">—</span>'}</td>
      <td>${progCell}</td>
    </tr>`;
  }).join('');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openProject(id) {
  currentProject = allProjects.find(p => p.id === id || String(p.id) === String(id));
  if (!currentProject) return;

  document.getElementById('modal-title').textContent = currentProject.name;
  document.getElementById('modal-path').textContent = currentProject.path || '';
  document.getElementById('modal-overview-link').href = `/projects/${encodeURIComponent(currentProject.id)}/overview`;
  document.getElementById('modal-overlay').classList.add('open');

  // Reset to first tab
  showModalTab('summary');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  cancelDelete();
  currentProject = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function showModalTab(tab) {
  currentModalTab = tab;
  document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('mtab-' + tab).classList.add('active');
  document.getElementById('mcontent-' + tab).classList.add('active');

  if (!currentProject) return;
  if (tab === 'summary') renderProjectSummary(currentProject);
  if (tab === 'overview') renderProjectOverview(currentProject);
  if (tab === 'design') renderDesignDocs(currentProject);
}

// ─── Tech stack categorization ────────────────────────────────────────────────
const _TECH_AI    = new Set(['openai','anthropic','claude','deepseek','ollama','gemini','dashscope','qwen','cosy','whisper','sentence-transformers','chromadb','faiss','hdbscan','scikit-learn','transformers','langchain','llamaindex','huggingface']);
const _TECH_DB    = new Set(['redis','postgres','postgresql','mysql','mongodb','sqlite','sqlalchemy','alembic','prisma','supabase','elasticsearch','kafka','rabbitmq','minio','s3']);
const _TECH_WEB   = new Set(['fastapi','express','nextjs','react','vue','svelte','nuxt','remix','django','flask','uvicorn','gunicorn','nginx','vite','webpack','tailwind','axios','httpx','requests','websocket']);
const _TECH_LANG  = new Set(['python','typescript','javascript','go','rust','java','kotlin','swift','ruby','php','c++','c#','lua','bash']);

function classifyTech(name) {
  const n = name.toLowerCase().replace(/[-_.@]/g, '');
  if ([..._TECH_AI].some(k => n.includes(k))) return 'ai';
  if ([..._TECH_DB].some(k => n.includes(k))) return 'db';
  if ([..._TECH_WEB].some(k => n.includes(k))) return 'web';
  if ([..._TECH_LANG].some(k => n.includes(k))) return 'lang';
  return 'infra';
}

function techPillClass(cat) {
  return { ai:'pill-ai', db:'pill-db', web:'pill-web', lang:'pill-lang', infra:'pill-infra' }[cat] || 'pill-infra';
}

// ─── Modal: 概览 Tab ─────────────────────────────────────────────────────────
function renderProjectSummary(p) {
  const el = document.getElementById('mcontent-summary');
  const svc = p.service || {};
  const ca = p.claude_activity;
  const deploy = p.deploy || {};
  const techStack = p.tech_stack || [];
  const features = p.features || [];
  const git = p.git || {};
  const wsState = wsSnapshot[p.id];
  const isRunning = wsState !== undefined ? wsState.is_running : svc.is_running;

  // ── Top KPI row ──
  const implCount = features.filter(f => f.implemented !== false).length;
  function _ago(iso) {
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 3600) return Math.round(diff/60) + 'm前';
    if (diff < 86400) return Math.round(diff/3600) + 'h前';
    return Math.round(diff/86400) + 'd前';
  }
  const caLast = ca && ca.last_session ? _ago(ca.last_session) : '—';
  const kpiRow = `<div class="sm-kpi-row">
    <div class="sm-kpi ${isRunning ? 'green' : ''}">
      <div class="sm-kl">服务状态</div>
      <div class="sm-kv ${isRunning ? 'green' : ''}">${isRunning ? '运行中' : (svc.port ? '停止' : '无服务')}</div>
    </div>
    <div class="sm-kpi">
      <div class="sm-kl">本月提交</div>
      <div class="sm-kv yellow">${git.monthly_commits || 0}</div>
    </div>
    <div class="sm-kpi">
      <div class="sm-kl">功能实现</div>
      <div class="sm-kv">${implCount}${features.length ? ' / ' + features.length : ''}</div>
    </div>
    <div class="sm-kpi ${ca ? 'accent' : ''}">
      <div class="sm-kl">Claude 上次</div>
      <div class="sm-kv purple">${caLast}</div>
    </div>
  </div>`;

  // ── Left col: service + tech stack ──
  const svcPort = svc.port ? `:${svc.port}` : '';
  const svcDomain = svc.public_domain ? `<div class="sm-domain">${escHtml(svc.public_domain)}</div>` : '';
  const svcIp = svc.public_ip ? `<div class="sm-svc-meta">${escHtml(svc.public_ip)}${svcPort}</div>` : (svcPort ? `<div class="sm-svc-meta">${svcPort}</div>` : '');
  const deployLine = deploy.type && deploy.type !== 'none'
    ? `<div class="sm-svc-meta">${DEPLOY_ICONS[deploy.type] || '☁️'} ${escHtml(deploy.type)}${deploy.host ? ' · ' + escHtml(deploy.host) : ''}</div>`
    : '';

  const svcCard = `<div class="sm-card">
    <div class="sm-svc-row">
      <div class="sm-dot ${isRunning ? 'on' : 'off'}"></div>
      <div class="sm-svc-name">${escHtml(p.name)}</div>
    </div>
    ${svcIp}${svcDomain}${deployLine}
    ${svc.url ? `<div class="sm-svc-meta" style="color:#4ade80">${escHtml(svc.url)}</div>` : ''}
  </div>`;

  const groups = { lang:[], web:[], ai:[], db:[], infra:[] };
  techStack.forEach(t => { const n = t.name || t; groups[classifyTech(n)].push(n); });
  const groupLabels = { lang:'语言', web:'框架', ai:'AI', db:'存储', infra:'工具链' };
  const techHtml = Object.entries(groups).filter(([,v]) => v.length).map(([cat, items]) => `
    <div class="sm-tech-group">
      <div class="sm-tech-label">${groupLabels[cat]}</div>
      <div class="sm-tech-pills">${items.map(n => `<span class="sm-pill ${cat}">${escHtml(n)}</span>`).join('')}</div>
    </div>`).join('');
  const techCard = techStack.length ? `<div class="sm-card">${techHtml}</div>` : '';

  // ── Right col: Claude + features ──
  let claudeCard = '';
  if (ca) {
    const spark = ca.session_spark_15d || [];
    const sparkMax = Math.max(...spark, 0.1);
    const sparkBars = spark.map(v => {
      const h = v === 0 ? 100 : Math.min(100, Math.max(15, Math.round((v / 12) * 100)));
      const cls = v === 0 ? '' : (v >= 12 || v >= sparkMax * 0.7) ? ' hi' : ' on';
      return `<span class="sm-sbar${cls}" style="height:${h}%"></span>`;
    }).join('');

    const todos = (ca.todos || []).slice(0, 5);
    const todoHtml = todos.length ? `<div class="sm-todo-list">${todos.map(t => {
      const s = t.status || 'pending';
      return `<div class="sm-todo"><div class="sm-todo-dot ${s}"></div><span style="color:${s==='completed'?'#4ade80':s==='in_progress'?'#facc15':'#4a5060'}">${escHtml(t.content || '')}</span></div>`;
    }).join('')}</div>` : '';

    claudeCard = `<div class="sm-card claude">
      <div class="sm-section-title" style="margin-bottom:10px">Claude</div>
      <div class="sm-cl-grid">
        <div class="sm-cl-stat"><div class="sm-cl-val">$${(ca.estimated_cost_usd||0).toFixed(1)}</div><div class="sm-cl-lbl">累计花费</div></div>
        <div class="sm-cl-stat"><div class="sm-cl-val">${ca.session_count_30d||0}</div><div class="sm-cl-lbl">30天会话</div></div>
        <div class="sm-cl-stat"><div class="sm-cl-val">${fmtTok(ca.output_tokens||0)}</div><div class="sm-cl-lbl">输出 Token</div></div>
        <div class="sm-cl-stat"><div class="sm-cl-val">${fmtTok(ca.cache_read_tokens||0)}</div><div class="sm-cl-lbl">Cache 读</div></div>
      </div>
      <div class="sm-spark">${sparkBars}</div>
      ${todoHtml}
    </div>`;
  }

  const featCard = features.length ? `<div class="sm-card">
    <div class="sm-section-title" style="margin-bottom:10px">功能列表</div>
    <div class="sm-feat-list">${features.map(f => {
      const impl = f.implemented !== false;
      return `<div class="sm-feat">
        <span class="sm-feat-check ${impl ? 'done' : 'plan'}">${impl ? '✓' : '○'}</span>
        <span>${escHtml(f.text || '')}</span>
      </div>`;
    }).join('')}</div>
  </div>` : '';

  el.innerHTML = kpiRow + `<div class="sm-cols">
    <div class="sm-col">${svcCard}${techCard}</div>
    <div class="sm-col">${claudeCard}${featCard}</div>
  </div>`;
}

// ─── Modal: 全局面貌 ──────────────────────────────────────────────────────────
function renderProjectOverview(p) {
  const el = document.getElementById('mcontent-overview');
  const git = p.git || {};
  const deploy = p.deploy || {};
  const loc = p.loc || {};
  const svc = p.service || {};
  const features = p.features || [];
  const extDeps = p.external_deps || [];

  // ── Shared deps lookup ──
  const shared = {};
  allProjects.forEach(op => {
    if (op.id === p.id) return;
    (op.external_deps || []).forEach(od => {
      extDeps.forEach(d => {
        if (d.name === od.name || (d.port && d.port === od.port)) {
          if (!shared[d.name]) shared[d.name] = [];
          if (!shared[d.name].includes(op.name)) shared[d.name].push(op.name);
        }
      });
    });
  });

  // ── Hero ──
  const wsState = wsSnapshot[p.id];
  const isRunning = wsState !== undefined ? wsState.is_running : svc.is_running;
  const svcBadge = svc.port
    ? `<span class="ov-badge ${isRunning ? 'ov-badge-running' : 'ov-badge-stopped'}">${isRunning ? '● 运行中' : '○ 停止'} :${svc.port}</span>`
    : '';
  const deployBadge = deploy.type && deploy.type !== 'none'
    ? `<span class="ov-badge ov-badge-deploy">${escHtml(deploy.type)}${deploy.host ? ' · ' + escHtml(deploy.host) : ''}</span>`
    : '';
  const curStatus = p.status || 'active';
  const statusOpts = Object.entries(STATUS_META).map(([k,v]) =>
    `<div class="status-opt${k===curStatus?' selected':''}" onclick="event.stopPropagation();setStatus('${escHtml(p.id)}','${k}',this)">${v.label}</div>`
  ).join('');
  const statusBadge = `<div class="status-dropdown-wrap" onclick="event.stopPropagation();toggleStatusMenu(this)" style="display:inline-block">
    <span class="ov-badge ov-badge-status status-badge-clickable">${escHtml(curStatus)} ▾</span>
    <div class="status-menu">${statusOpts}</div>
  </div>`;

  // Extract one-liner: first non-heading line from arch_summary
  let oneLiner = '';
  if (p.arch_summary) {
    const firstLine = p.arch_summary.split('\n').find(l => l.trim() && !l.startsWith('#'));
    oneLiner = firstLine ? firstLine.replace(/^\*\*[^*]+\*\*[:：]\s*/, '').trim() : '';
  }

  const summaryBtnId = `btn-summarize-${p.id}`;
  let html = `<div class="ov-hero">
    <button class="ov-regen-btn" id="${summaryBtnId}" onclick="generateSummary('${escHtml(p.id)}')">↻ 重新生成</button>
    <div class="ov-hero-title">${escHtml(p.name)}</div>
    ${oneLiner ? `<div class="ov-hero-oneliner">${escHtml(oneLiner)}</div>` : ''}
    <div class="ov-hero-badges">${svcBadge}${deployBadge}${statusBadge}</div>
  </div>`;

  // ── Two-column: arch markdown + tech stack ──
  const techStack = p.tech_stack || [];
  const groups = { lang:[], web:[], ai:[], db:[], infra:[] };
  techStack.forEach(t => {
    const name = t.name || t;
    groups[classifyTech(name)].push(name);
  });
  const groupLabels = { lang:'语言', web:'框架 / API', ai:'AI / ML', db:'存储', infra:'工具链' };

  const techPanelHtml = Object.entries(groups)
    .filter(([, items]) => items.length)
    .map(([cat, items]) => `
      <div class="ov-tech-group">
        <div class="ov-tech-group-label">${groupLabels[cat]}</div>
        <div class="ov-tech-pills">
          ${items.map(n => `<span class="ov-tech-pill ${techPillClass(cat)}">${escHtml(n)}</span>`).join('')}
        </div>
      </div>`).join('');

  if (p.arch_summary || techStack.length) {
    html += `<div class="ov-cols">`;
    if (p.arch_summary) {
      html += `<div class="arch-text" id="arch-text-${p.id}">${simpleMarkdown(p.arch_summary)}</div>`;
    } else {
      html += `<div class="arch-text" style="color:#555;display:flex;align-items:center;justify-content:center;">
        <button onclick="generateSummary('${escHtml(p.id)}')" style="font-size:12px;padding:6px 14px;cursor:pointer;border:1px solid #4a7c59;border-radius:5px;background:#1e3a28;color:#7fc794;">✨ AI 生成总结</button>
      </div>`;
    }
    if (techStack.length) {
      html += `<div class="ov-tech-panel">
        <div class="ov-tech-panel-title">技术栈</div>
        ${techPanelHtml}
      </div>`;
    }
    html += `</div>`;
  }

  // ── Service map (project → external deps) ──
  if (extDeps.length) {
    const nodes = extDeps.map(d => {
      const sharedWith = shared[d.name] || [];
      const isShared = sharedWith.length > 0;
      let meta = d.port ? `:${d.port}` : '';
      if (!meta && d.url) { try { meta = new URL(d.url.startsWith('http') ? d.url : 'http://' + d.url).hostname; } catch(_) {} }
      const sharedBadge = isShared
        ? `<div class="ov-svc-shared-badge">共用 · ${escHtml(sharedWith.join(', '))}</div>`
        : '';
      return `
        <div class="ov-svc-arrow">→</div>
        <div class="ov-svc-node">
          <div class="ov-svc-node-box ext${isShared ? ' shared' : ''}">${escHtml(d.name)}</div>
          ${meta ? `<div class="ov-svc-node-meta">${escHtml(meta)}</div>` : ''}
          ${sharedBadge}
        </div>`;
    }).join('');

    html += `<div class="ov-svc-map">
      <div class="ov-svc-map-title">服务依赖</div>
      <div class="ov-svc-flow">
        <div class="ov-svc-node">
          <div class="ov-svc-node-box self">${escHtml(p.name)}</div>
          ${svc.port ? `<div class="ov-svc-node-meta">:${svc.port}</div>` : ''}
        </div>
        ${nodes}
      </div>
    </div>`;
  }

  // ── Bottom data row: LOC · Git · Languages ──
  const hasLoc = loc.total_lines || loc.code_lines;
  const hasGit = git.branch;
  const hasLangs = (loc.languages || []).length > 0;

  if (hasLoc || hasGit || hasLangs) {
    html += `<div class="ov-data-row">`;

    // LOC card
    if (hasLoc) {
      html += `<div class="ov-data-card">
        <div class="ov-data-card-title">代码规模</div>
        <div class="ov-stat-grid">
          <div class="ov-stat"><div class="ov-stat-val">${((loc.total_lines || 0) / 1000).toFixed(1)}k</div><div class="ov-stat-label">总行数</div></div>
          <div class="ov-stat"><div class="ov-stat-val">${((loc.code_lines || 0) / 1000).toFixed(1)}k</div><div class="ov-stat-label">代码行</div></div>
          <div class="ov-stat"><div class="ov-stat-val">${loc.file_count || 0}</div><div class="ov-stat-label">文件数</div></div>
          <div class="ov-stat"><div class="ov-stat-val">${loc.total_lines ? Math.round(((loc.comment_lines || 0) / loc.total_lines) * 100) : 0}%</div><div class="ov-stat-label">注释率</div></div>
        </div>
      </div>`;
    }

    // Git card
    if (hasGit) {
      const recentCommits = (git.recent_commits || []).slice(0, 4);
      html += `<div class="ov-data-card">
        <div class="ov-data-card-title">Git</div>
        <div class="ov-git-items">
          <div class="ov-git-kv"><span class="k">分支</span><span class="v">${escHtml(git.branch || '—')}</span></div>
          <div class="ov-git-kv"><span class="k">Commit</span><span class="v">${escHtml((git.commit_hash || '').slice(0, 7) || '—')}</span></div>
          <div class="ov-git-kv"><span class="k">本月提交</span><span class="v">${git.monthly_commits || 0}</span></div>
          ${(git.dirty_files || []).length ? `<div class="ov-git-kv"><span class="k">未提交</span><span class="v" style="color:var(--orange)">${git.dirty_files.length} 文件</span></div>` : ''}
        </div>
        ${recentCommits.length ? `<div style="margin-top:8px;display:flex;flex-direction:column;gap:3px;">
          ${recentCommits.map(c => {
            const msg = typeof c === 'object' ? (c.message || c.msg || String(c)) : String(c);
            return `<div style="font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(msg)}</div>`;
          }).join('')}
        </div>` : ''}
      </div>`;
    }

    // Languages card
    if (hasLangs) {
      const langs = (loc.languages || []).slice(0, 6);
      const maxLines = Math.max(...langs.map(l => l.code || 0), 1);
      html += `<div class="ov-data-card">
        <div class="ov-data-card-title">语言分布</div>
        <div class="ov-lang-list">
          ${langs.map((l, i) => {
            const lines = l.code || 0;
            const pct = Math.round((lines / maxLines) * 100);
            const color = LANG_COLORS[i % LANG_COLORS.length];
            return `<div class="ov-lang-row">
              <span class="ov-lang-name">${escHtml(l.name || '')}</span>
              <div class="ov-lang-track"><div class="ov-lang-fill" style="width:${pct}%;background:${color}"></div></div>
              <span class="ov-lang-num">${lines >= 1000 ? (lines/1000).toFixed(1)+'k' : lines}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }

    html += `</div>`;
  }

  // ── Features (compact, below fold) ──
  if (features.length) {
    html += `<div class="section">
      <div class="section-title">功能列表</div>
      <div class="feature-list">
        ${features.map(f => {
          const impl = f.implemented !== false;
          return `<div class="feature-item">
            <span class="feature-check ${impl ? 'done' : 'planned'}">${impl ? '✓' : '○'}</span>
            <span class="feature-text">${escHtml(f.text || '')}</span>
            ${f.source ? `<span class="feature-source">${escHtml(f.source)}</span>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (!html) html = '<div class="placeholder"><div class="placeholder-icon">🌐</div><div class="placeholder-title">暂无概览信息</div></div>';
  el.innerHTML = html;
}

// ─── Modal: 设计文档 ──────────────────────────────────────────────────────────
function renderDesignDocs(p) {
  const el = document.getElementById('mcontent-design');
  const docs = p.design_docs || [];

  if (!docs.length) {
    el.innerHTML = `<div class="placeholder">
      <div class="placeholder-icon">📐</div>
      <div class="placeholder-title">暂无设计文档</div>
    </div>`;
    return;
  }

  currentDocIdx = 0;

  const sidebarItems = docs.map((d, i) => `
    <div class="doc-file-item ${i === 0 ? 'active' : ''}" id="doc-item-${i}" onclick="showDoc(${i})">
      <span>${escHtml(d.filename || d.title || `文档 ${i+1}`)}</span>
      ${d.possibly_stale ? '<span class="stale-dot" title="可能已过期"></span>' : ''}
    </div>`).join('');

  const aiCmd = p.path
    ? `claude "请根据最新代码更新设计文档" --project "${escHtml(p.path)}"`
    : '';

  el.innerHTML = `<div class="docs-layout">
    <div class="docs-sidebar">
      <div class="docs-sidebar-title">文档列表</div>
      ${sidebarItems}
      ${aiCmd ? `<div class="ai-cmd-section">
        <div class="ai-cmd-label">✦ AI 更新文档</div>
        <div class="ai-cmd-box">
          <span class="ai-cmd-text" id="ai-cmd-text">${escHtml(aiCmd)}</span>
          <button class="copy-btn" onclick="copyAiCmd()">复制</button>
        </div>
      </div>` : ''}
    </div>
    <div class="docs-content" id="docs-content">
      <!-- doc content injected here -->
    </div>
  </div>`;

  showDoc(0);
}

function showDoc(idx) {
  const p = currentProject;
  if (!p) return;
  const docs = p.design_docs || [];
  if (idx < 0 || idx >= docs.length) return;

  currentDocIdx = idx;
  document.querySelectorAll('.doc-file-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const doc = docs[idx];
  const content = document.getElementById('docs-content');
  if (!content) return;

  const rendered = simpleMarkdown(doc.content || '');
  content.innerHTML = `
    <div class="docs-content-title">${escHtml(doc.title || doc.filename || '')}</div>
    ${doc.possibly_stale ? `<div style="font-size:11px;color:var(--orange);margin-bottom:8px">⚠ 此文档可能已过期</div>` : ''}
    <div class="markdown-body">${rendered}</div>`;
}

function copyAiCmd() {
  const el = document.getElementById('ai-cmd-text');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = el.textContent;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  });
  const btn = document.querySelector('.copy-btn');
  if (btn) { btn.textContent = '已复制!'; setTimeout(() => btn.textContent = '复制', 1500); }
}

// ─── Modal: 计划 ──────────────────────────────────────────────────────────────
function renderPlans(p) {
  const el = document.getElementById('mcontent-plans');
  const plans = p.plans || {};
  const files = plans.files || [];

  if (!files.length) {
    el.innerHTML = `<div class="placeholder">
      <div class="placeholder-icon">✅</div>
      <div class="placeholder-title">暂无计划文件</div>
    </div>`;
    return;
  }

  let html = '';

  // Overall progress
  html += `<div class="section">
    <div class="section-title">总体进度</div>
    ${progressBar(plans.done || 0, plans.total || 0)}
  </div>`;

  // Per file
  html += files.map(f => {
    const tasks = f.tasks || [];
    const done = tasks.filter(t => t.done).length;
    const total = tasks.length;

    return `<div class="plan-file">
      <div class="plan-file-name">${escHtml(f.filename || '')}</div>
      <div class="plan-progress-row">
        ${progressBar(done, total)}
      </div>
      <div class="task-list">
        ${tasks.map(t => `<div class="task-item">
          <span class="task-check ${t.done ? 'done' : 'todo'}">${t.done ? '✓' : '○'}</span>
          <span class="task-text ${t.done ? 'done' : 'todo'}">${escHtml(t.text || '')}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  el.innerHTML = html;
}

async function generateSummary(projectId) {

  try {
    const res = await fetch(`/api/projects/${projectId}/summarize?force=true`, { method: 'POST' });

    if (res.ok && data.status === 'ok' && data.project) {

      alert(`生成失败: ${detail}`);
    }
  } catch (e) {
