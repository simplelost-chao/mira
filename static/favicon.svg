<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0f"/>
  <!-- subtle grid lines -->
  <line x1="0" y1="32" x2="64" y2="32" stroke="#00d4ff" stroke-width="0.3" opacity="0.15"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="#00d4ff" stroke-width="0.3" opacity="0.15"/>
  <!-- M glyph with glow -->
  <text x="32" y="46" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="38" font-weight="700"
        fill="#00d4ff" filter="url(#glow)" opacity="0.9">M</text>
</svg>
